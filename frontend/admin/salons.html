<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salon Management | Admin Console</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#D4AF37;--gl:#F5D878;--gdim:rgba(212,175,55,0.15);--bg:#0A0A0F;--card:#12121A;--sidebar:#0D0D15;--text:#F0F0F0;--muted:#8B8BA0;--border:rgba(212,175,55,0.15);--green:#10B981;--red:#EF4444;--blue:#3B82F6;--orange:#F59E0B}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
a{color:inherit;text-decoration:none}
.sidebar{width:240px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100}
.sb-logo{padding:1.5rem 1.2rem;border-bottom:1px solid var(--border)}
.sb-logo-text{font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,var(--gold),var(--gl));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sb-nav{flex:1;padding:.8rem 0}
.sb-link{display:flex;align-items:center;gap:.75rem;padding:.8rem 1.2rem;color:var(--muted);font-size:.9rem;transition:all .2s;border-left:3px solid transparent}
.sb-link:hover{color:var(--text);background:rgba(255,255,255,0.03)}
.sb-link.active{color:var(--gold);border-left-color:var(--gold);background:var(--gdim)}
.sb-badge{font-size:.65rem;background:var(--red);color:#fff;padding:.1rem .4rem;border-radius:8px;font-weight:600;margin-left:.3rem}
.sb-footer{padding:1rem 1.2rem;border-top:1px solid var(--border)}
.sb-user{font-size:.85rem;color:var(--muted);margin-bottom:.6rem}
.sb-user span{display:block;color:var(--text);font-weight:600}
.btn-logout{width:100%;padding:.55rem;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.82rem}
.btn-logout:hover{border-color:var(--red);color:var(--red)}
.main{margin-left:240px;flex:1}
.topbar{padding:1rem 2rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;background:rgba(10,10,15,.9);backdrop-filter:blur(12px)}
.topbar-title{font-size:1.3rem;font-weight:700}
.content{padding:1.5rem 2rem}
/* FILTER */
.filter-bar{display:flex;gap:.8rem;flex-wrap:wrap;margin-bottom:1.5rem;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;align-items:center}
.filter-input{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);padding:.5rem .9rem;border-radius:8px;font-family:'Outfit',sans-serif;font-size:.88rem;outline:none}
.filter-input:focus{border-color:var(--gold)}
.status-tabs{display:flex;gap:.4rem}
.stab{padding:.45rem 1rem;border-radius:24px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'Outfit',sans-serif;font-size:.85rem;transition:all .2s}
.stab.active{background:var(--gdim);border-color:var(--gold);color:var(--gold)}
/* TABLE */
.section{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.section-header{padding:1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.section-header .title{font-weight:700}
table{width:100%;border-collapse:collapse;font-size:.87rem}
th{color:var(--muted);font-weight:600;text-align:left;padding:.7rem 1rem;border-bottom:1px solid var(--border);font-size:.75rem;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
td{padding:.75rem 1rem;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
tr:last-child td{border:none}
tr:hover td{background:rgba(255,255,255,.02)}
.badge{padding:.22rem .65rem;border-radius:12px;font-size:.75rem;font-weight:600}
.badge-approved{background:rgba(16,185,129,.15);color:var(--green)}
.badge-pending{background:rgba(245,158,11,.15);color:var(--orange)}
.badge-rejected{background:rgba(239,68,68,.1);color:var(--red)}
.btn-sm{padding:.32rem .7rem;border-radius:6px;font-family:'Outfit',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;border:none;transition:all .2s;margin-right:.2rem}
.btn-approve{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);color:var(--green)}
.btn-approve:hover{background:var(--green);color:#fff}
.btn-reject{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:var(--red)}
.btn-reject:hover{background:var(--red);color:#fff}
.btn-comm{background:var(--gdim);border:1px solid var(--gold);color:var(--gold)}
.btn-comm:hover{background:var(--gold);color:#000}
.stars-sm{color:var(--gold);font-size:.82rem}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:1000;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.8rem;width:100%;max-width:440px;animation:mi .3s ease}
@keyframes mi{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-title{font-size:1.2rem;font-weight:700;margin-bottom:.4rem}
.modal-sub{color:var(--muted);font-size:.88rem;margin-bottom:1.2rem}
label{display:block;font-size:.83rem;color:var(--muted);margin-bottom:.3rem;font-weight:500}
input,textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);padding:.7rem .9rem;border-radius:8px;font-family:'Outfit',sans-serif;font-size:.9rem;outline:none;transition:border-color .3s;margin-bottom:.8rem}
input:focus,textarea:focus{border-color:var(--gold)}
.modal-actions{display:flex;gap:.6rem;justify-content:flex-end;margin-top:.4rem}
.btn-cancel-modal{padding:.6rem 1.2rem;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif}
.btn-save{padding:.6rem 1.4rem;background:linear-gradient(135deg,var(--gold),var(--gl));color:#000;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif}
.btn-danger{padding:.6rem 1.4rem;background:var(--red);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.8rem 1.2rem;z-index:9999;display:none;font-size:.88rem}
.toast.show{display:flex;align-items:center;gap:.5rem}
.toast.success{border-color:var(--green)}.toast.error{border-color:var(--red)}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-text">⚙️ Admin Console</div>
    <div style="font-size:.72rem;color:var(--muted);margin-top:.2rem">Urban HairPlaza</div>
  </div>
  <nav class="sb-nav">
    <a href="/admin/index.html" class="sb-link"><span>📊</span> Dashboard</a>
    <a href="/admin/salons.html" class="sb-link active"><span>🏪</span> Salons <span class="sb-badge" id="pendBadge">—</span></a>
    <a href="/admin/analytics.html" class="sb-link"><span>📈</span> Analytics</a>
    <a href="/admin/subscriptions.html" class="sb-link"><span>💎</span> Plans</a>
    <a href="/admin/audit.html" class="sb-link"><span>📋</span> Audit Logs</a>
  </nav>
  <div class="sb-footer"><div class="sb-user">Super Admin<span id="sbName">—</span></div><button class="btn-logout" onclick="logout()">Sign Out</button></div>
</aside>
<div class="main">
  <div class="topbar"><div class="topbar-title">Salon Management</div><div id="countLabel" style="color:var(--muted);font-size:.88rem"></div></div>
  <div class="content">
    <div class="filter-bar">
      <div class="status-tabs">
        <button class="stab active" onclick="setStatus('',this)">All</button>
        <button class="stab" onclick="setStatus('pending',this)">⏳ Pending</button>
        <button class="stab" onclick="setStatus('approved',this)">✅ Approved</button>
        <button class="stab" onclick="setStatus('rejected',this)">❌ Rejected</button>
      </div>
      <input type="text" class="filter-input" id="searchInput" placeholder="Search salon, owner, city..." oninput="debounce()" style="flex:1;min-width:180px">
    </div>
    <div class="section">
      <div class="section-header"><div class="title">All Salons</div></div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>Salon</th><th>Category</th><th>Owner</th><th>City</th><th>Bookings</th><th>Revenue</th><th>Rating</th><th>Status</th><th>Commission</th><th>Actions</th></tr></thead>
          <tbody id="salonTable"><tr><td colspan="10" style="text-align:center;padding:2rem;color:var(--muted)">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- REJECT MODAL -->
<div class="modal-overlay" id="rejectModal">
  <div class="modal">
    <div class="modal-title">Reject Salon</div>
    <div class="modal-sub" id="rejectSalonName"></div>
    <label>Rejection Reason</label>
    <textarea id="rejectReason" rows="3" placeholder="Explain why the salon was rejected..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel-modal" onclick="closeModal()">Cancel</button>
      <button class="btn-danger" onclick="doReject()">Reject Salon</button>
    </div>
  </div>
</div>

<!-- COMMISSION MODAL -->
<div class="modal-overlay" id="commModal">
  <div class="modal">
    <div class="modal-title">Update Commission Rate</div>
    <div class="modal-sub" id="commSalonName"></div>
    <label>Commission Rate (%)</label>
    <input type="number" id="commRate" min="0" max="50" step="0.5" placeholder="10">
    <div class="modal-actions">
      <button class="btn-cancel-modal" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveCommission()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'http://localhost:3000/api';
const getToken = () => localStorage.getItem('uhp_token');
const getUser = () => { try { return JSON.parse(localStorage.getItem('uhp_user')); } catch { return null; } };
const user = getUser();
if (!user || user.role !== 'admin') window.location.href = '/customer/index.html';
document.getElementById('sbName').textContent = user?.name || '';
const headers = { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' };

let currentStatus = '', searchTimer = null, rejectId = null, commId = null;

function toast(msg, type='success') { const t=document.getElementById('toast'); t.textContent=msg; t.className=`toast show ${type}`; setTimeout(()=>t.classList.remove('show'),3000); }
function logout() { localStorage.clear(); window.location.href='/customer/index.html'; }

async function load() {
  const params = new URLSearchParams();
  if (currentStatus) params.set('status', currentStatus);
  const search = document.getElementById('searchInput').value.trim();
  if (search) params.set('search', search);
  const r = await fetch(`${API}/admin/salons?${params}`, { headers: { 'Authorization': 'Bearer ' + getToken() } });
  const salons = await r.json();
  const pending = salons.filter(s => s.status === 'pending').length;
  document.getElementById('pendBadge').textContent = pending;
  document.getElementById('countLabel').textContent = salons.length + ' salons';
  renderTable(salons);
}

function renderTable(salons) {
  const tbody = document.getElementById('salonTable');
  if (!salons.length) { tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:2rem;color:var(--muted)">No salons found</td></tr>'; return; }
  tbody.innerHTML = salons.map(s => `<tr>
    <td>
      <div style="display:flex;align-items:center;gap.6rem;gap:.6rem">
        ${s.primary_photo ? `<img src="${s.primary_photo}" style="width:36px;height:36px;border-radius:8px;object-fit:cover;flex-shrink:0" onerror="this.style.display='none'">` : ''}
        <div><strong>${s.name}</strong><br><span style="font-size:.74rem;color:var(--muted)">${s.slug||''}</span></div>
      </div>
    </td>
    <td>${s.category}</td>
    <td>${s.owner_name}<br><span style="font-size:.74rem;color:var(--muted)">${s.owner_email||''}</span></td>
    <td>${s.city}</td>
    <td>${s.booking_count||0}</td>
    <td>₹${(s.total_revenue||0).toLocaleString('en-IN')}</td>
    <td class="stars-sm">${'★'.repeat(Math.round(s.avg_rating||0))}${'☆'.repeat(5-Math.round(s.avg_rating||0))}</td>
    <td><span class="badge badge-${s.status}">${s.status}</span></td>
    <td>${s.commission_rate||10}%<br><button class="btn-sm btn-comm" onclick="openCommModal(${s.id},'${s.name}',${s.commission_rate||10})">Edit</button></td>
    <td>
      ${s.status !== 'approved' ? `<button class="btn-sm btn-approve" onclick="approve(${s.id})">✓ Approve</button>` : ''}
      ${s.status !== 'rejected' ? `<button class="btn-sm btn-reject" onclick="openRejectModal(${s.id},'${s.name.replace(/'/g,"\\'")}')">✕ Reject</button>` : ''}
    </td>
  </tr>`).join('');
}

function setStatus(status, btn) {
  currentStatus = status;
  document.querySelectorAll('.stab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  load();
}

function debounce() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(load, 400);
}

async function approve(id) {
  const r = await fetch(`${API}/admin/salons/${id}/status`, { method:'PATCH', headers, body:JSON.stringify({status:'approved'}) });
  if (r.ok) { toast('✅ Salon approved! Now visible to customers.'); load(); }
  else toast('❌ Failed','error');
}

function openRejectModal(id, name) {
  rejectId = id;
  document.getElementById('rejectSalonName').textContent = name;
  document.getElementById('rejectReason').value = '';
  document.getElementById('rejectModal').classList.add('open');
}

async function doReject() {
  const reason = document.getElementById('rejectReason').value.trim();
  const r = await fetch(`${API}/admin/salons/${rejectId}/status`, { method:'PATCH', headers, body:JSON.stringify({status:'rejected',reason}) });
  if (r.ok) { closeModal(); toast('❌ Salon rejected','error'); load(); }
  else toast('❌ Failed','error');
}

function openCommModal(id, name, current) {
  commId = id;
  document.getElementById('commSalonName').textContent = name;
  document.getElementById('commRate').value = current;
  document.getElementById('commModal').classList.add('open');
}

async function saveCommission() {
  const rate = parseFloat(document.getElementById('commRate').value);
  if (isNaN(rate)) { toast('Enter a valid number','error'); return; }
  const r = await fetch(`${API}/admin/salons/${commId}/commission`, { method:'PUT', headers, body:JSON.stringify({commission_rate:rate}) });
  if (r.ok) { closeModal(); toast('✅ Commission rate updated'); load(); }
  else toast('❌ Failed','error');
}

function closeModal() {
  document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('open'));
}

load();
</script>
</body>
</html>
