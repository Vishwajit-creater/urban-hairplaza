<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subscription Plans | Admin Console</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#D4AF37;--gl:#F5D878;--gdim:rgba(212,175,55,0.15);--bg:#0A0A0F;--card:#12121A;--sidebar:#0D0D15;--text:#F0F0F0;--muted:#8B8BA0;--border:rgba(212,175,55,0.15);--green:#10B981;--red:#EF4444;--purple:#8B5CF6}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
a{color:inherit;text-decoration:none}
.sidebar{width:240px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100}
.sb-logo{padding:1.5rem 1.2rem;border-bottom:1px solid var(--border)}
.sb-logo-text{font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,var(--gold),var(--gl));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sb-nav{flex:1;padding:.8rem 0}
.sb-link{display:flex;align-items:center;gap:.75rem;padding:.8rem 1.2rem;color:var(--muted);font-size:.9rem;transition:all .2s;border-left:3px solid transparent}
.sb-link:hover{color:var(--text);background:rgba(255,255,255,0.03)}
.sb-link.active{color:var(--gold);border-left-color:var(--gold);background:var(--gdim)}
.sb-footer{padding:1rem 1.2rem;border-top:1px solid var(--border)}
.sb-user{font-size:.85rem;color:var(--muted);margin-bottom:.6rem}
.sb-user span{display:block;color:var(--text);font-weight:600}
.btn-logout{width:100%;padding:.55rem;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.82rem}
.btn-logout:hover{border-color:var(--red);color:var(--red)}
.main{margin-left:240px;flex:1}
.topbar{padding:1rem 2rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;background:rgba(10,10,15,.9);backdrop-filter:blur(12px)}
.topbar-title{font-size:1.3rem;font-weight:700}
.content{padding:2rem}
/* PLANS */
.plans-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;margin-bottom:2rem}
@media(max-width:900px){.plans-grid{grid-template-columns:1fr}}
.plan-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.8rem;position:relative;transition:border-color .3s}
.plan-card.featured{border-color:var(--gold);box-shadow:0 0 40px rgba(212,175,55,0.1)}
.plan-badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--gold),var(--gl));color:#000;padding:.25rem 1rem;border-radius:20px;font-size:.75rem;font-weight:700;white-space:nowrap}
.plan-icon{font-size:2rem;margin-bottom:.8rem}
.plan-name{font-size:1.3rem;font-weight:800;margin-bottom:.4rem}
.plan-price{font-size:2.5rem;font-weight:800;color:var(--gold);margin-bottom:.2rem}
.plan-period{color:var(--muted);font-size:.85rem;margin-bottom:1.2rem}
.plan-features{list-style:none;margin-bottom:1.5rem}
.plan-features li{padding:.4rem 0;font-size:.88rem;color:var(--muted);display:flex;align-items:center;gap.4rem;gap:.4rem;border-bottom:1px solid rgba(255,255,255,.04)}
.plan-features li:last-child{border:none}
.feature-check{color:var(--green);margin-right:.5rem;font-size:.9rem}
.btn-edit-plan{width:100%;padding:.7rem;background:var(--gdim);border:1px solid var(--gold);color:var(--gold);border-radius:10px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:600;transition:all .2s}
.btn-edit-plan:hover{background:var(--gold);color:#000}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:1000;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.8rem;width:100%;max-width:480px;animation:mi .3s ease}
@keyframes mi{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-title{font-size:1.2rem;font-weight:700;margin-bottom:1.2rem}
.form-group{margin-bottom:1rem}
label{display:block;font-size:.83rem;color:var(--muted);margin-bottom:.3rem;font-weight:500}
input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);padding:.7rem .9rem;border-radius:8px;font-family:'Outfit',sans-serif;font-size:.9rem;outline:none;transition:border-color .3s}
input:focus{border-color:var(--gold)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
.modal-actions{display:flex;gap:.6rem;justify-content:flex-end;margin-top:1.2rem}
.btn-cancel-modal{padding:.6rem 1.2rem;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif}
.btn-save{padding:.6rem 1.4rem;background:linear-gradient(135deg,var(--gold),var(--gl));color:#000;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.8rem 1.2rem;z-index:9999;display:none;font-size:.88rem}
.toast.show{display:flex;align-items:center;gap:.5rem}
.toast.success{border-color:var(--green)}.toast.error{border-color:var(--red)}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sb-logo"><div class="sb-logo-text">⚙️ Admin Console</div><div style="font-size:.72rem;color:var(--muted);margin-top:.2rem">Urban HairPlaza</div></div>
  <nav class="sb-nav">
    <a href="/admin/index.html" class="sb-link"><span>📊</span> Dashboard</a>
    <a href="/admin/salons.html" class="sb-link"><span>🏪</span> Salons</a>
    <a href="/admin/analytics.html" class="sb-link"><span>📈</span> Analytics</a>
    <a href="/admin/subscriptions.html" class="sb-link active"><span>💎</span> Plans</a>
    <a href="/admin/audit.html" class="sb-link"><span>📋</span> Audit Logs</a>
  </nav>
  <div class="sb-footer"><div class="sb-user">Super Admin<span id="sbName">—</span></div><button class="btn-logout" onclick="logout()">Sign Out</button></div>
</aside>
<div class="main">
  <div class="topbar"><div class="topbar-title">Subscription Plans</div></div>
  <div class="content">
    <div class="plans-grid" id="plansGrid"><div style="color:var(--muted)">Loading plans...</div></div>
  </div>
</div>

<!-- EDIT PLAN MODAL -->
<div class="modal-overlay" id="planModal">
  <div class="modal">
    <div class="modal-title" id="planModalTitle">Edit Plan</div>
    <input type="hidden" id="editPlanId">
    <div class="form-row">
      <div class="form-group"><label>Monthly Price (₹)</label><input type="number" id="fPrice" placeholder="999"></div>
      <div class="form-group"><label>Max Staff</label><input type="number" id="fMaxStaff" placeholder="5"></div>
    </div>
    <div class="form-group"><label>Max Services (-1 = unlimited)</label><input type="number" id="fMaxServices" placeholder="20"></div>
    <div class="modal-actions">
      <button class="btn-cancel-modal" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="savePlan()">Save Changes</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? '/api' : 'https://urban-hairplaza.onrender.com/api';
const getToken = () => localStorage.getItem('uhp_token');
const getUser = () => { try { return JSON.parse(localStorage.getItem('uhp_user')); } catch { return null; } };
const user = getUser();
if (!user || user.role !== 'admin') window.location.href = '/customer/index.html';
document.getElementById('sbName').textContent = user?.name || '';
const headers = { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' };
const PLAN_ICONS = { Basic:'⭐', Pro:'🚀', Enterprise:'💎', default:'📦' };
const PLAN_FEATURED = ['Pro', 'pro'];

function toast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast show ${type}`;setTimeout(()=>t.classList.remove('show'),3000);}
function logout(){localStorage.clear();window.location.href='/customer/index.html';}

async function load() {
  const r = await fetch(`${API}/admin/plans`, { headers: { 'Authorization': 'Bearer ' + getToken() } });
  const plans = await r.json();
  document.getElementById('plansGrid').innerHTML = plans.map(p => {
    const icon = PLAN_ICONS[p.name] || PLAN_ICONS.default;
    const featured = PLAN_FEATURED.includes(p.name);
    const maxStaff = p.max_staff === -1 ? 'Unlimited' : p.max_staff;
    const maxServices = p.max_services === -1 ? 'Unlimited' : p.max_services;
    return `<div class="plan-card ${featured?'featured':''}">
      ${featured ? '<div class="plan-badge">Most Popular</div>' : ''}
      <div class="plan-icon">${icon}</div>
      <div class="plan-name">${p.name}</div>
      <div class="plan-price">₹${(p.price||0).toLocaleString('en-IN')}</div>
      <div class="plan-period">per month + GST</div>
      <ul class="plan-features">
        <li><span class="feature-check">✓</span>Up to ${maxStaff} staff members</li>
        <li><span class="feature-check">✓</span>Up to ${maxServices} services</li>
        <li><span class="feature-check">✓</span>Online booking portal</li>
        <li><span class="feature-check">✓</span>Analytics dashboard</li>
        ${p.name !== 'Basic' ? '<li><span class="feature-check">✓</span>Priority support</li>' : ''}
        ${p.name === 'Enterprise' ? '<li><span class="feature-check">✓</span>Custom integrations</li>' : ''}
      </ul>
      <button class="btn-edit-plan" onclick="openEdit(${p.id},'${p.name}',${p.price},${p.max_staff},${p.max_services})">✏️ Edit Plan</button>
    </div>`;
  }).join('');
}

function openEdit(id, name, price, maxStaff, maxSvc) {
  document.getElementById('editPlanId').value = id;
  document.getElementById('planModalTitle').textContent = 'Edit ' + name + ' Plan';
  document.getElementById('fPrice').value = price;
  document.getElementById('fMaxStaff').value = maxStaff;
  document.getElementById('fMaxServices').value = maxSvc;
  document.getElementById('planModal').classList.add('open');
}

async function savePlan() {
  const id = document.getElementById('editPlanId').value;
  const body = {
    price: parseFloat(document.getElementById('fPrice').value),
    max_staff: parseInt(document.getElementById('fMaxStaff').value),
    max_services: parseInt(document.getElementById('fMaxServices').value),
  };
  const r = await fetch(`${API}/admin/plans/${id}`, { method:'PUT', headers, body:JSON.stringify(body) });
  if (r.ok) { closeModal(); toast('✅ Plan updated'); load(); }
  else toast('❌ Failed to update plan','error');
}

function closeModal() { document.getElementById('planModal').classList.remove('open'); }
load();
</script>
</body>
</html>
