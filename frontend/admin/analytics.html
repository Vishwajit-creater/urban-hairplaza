<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics | Admin Console</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#D4AF37;--gl:#F5D878;--gdim:rgba(212,175,55,0.15);--bg:#0A0A0F;--card:#12121A;--sidebar:#0D0D15;--text:#F0F0F0;--muted:#8B8BA0;--border:rgba(212,175,55,0.15);--green:#10B981;--red:#EF4444;--blue:#3B82F6;--purple:#8B5CF6}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
a{color:inherit;text-decoration:none}
.sidebar{width:240px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100}
.sb-logo{padding:1.5rem 1.2rem;border-bottom:1px solid var(--border)}
.sb-logo-text{font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,var(--gold),var(--gl));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sb-nav{flex:1;padding:.8rem 0}
.sb-link{display:flex;align-items:center;gap:.75rem;padding:.8rem 1.2rem;color:var(--muted);font-size:.9rem;transition:all .2s;border-left:3px solid transparent}
.sb-link:hover{color:var(--text);background:rgba(255,255,255,0.03)}
.sb-link.active{color:var(--gold);border-left-color:var(--gold);background:var(--gdim)}
.sb-footer{padding:1rem 1.2rem;border-top:1px solid var(--border)}
.sb-user{font-size:.85rem;color:var(--muted);margin-bottom:.6rem}
.sb-user span{display:block;color:var(--text);font-weight:600}
.btn-logout{width:100%;padding:.55rem;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.82rem}
.btn-logout:hover{border-color:var(--red);color:var(--red)}
.main{margin-left:240px;flex:1}
.topbar{padding:1rem 2rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;background:rgba(10,10,15,.9);backdrop-filter:blur(12px)}
.topbar-title{font-size:1.3rem;font-weight:700}
.content{padding:1.5rem 2rem}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
@media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.2rem}
.kpi-icon{font-size:1.5rem;margin-bottom:.4rem}
.kpi-label{font-size:.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:600;margin-bottom:.3rem}
.kpi-value{font-size:1.8rem;font-weight:800;color:var(--gold)}
.section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1.5rem}
.section-title{font-size:1rem;font-weight:700;margin-bottom:1.2rem}
table{width:100%;border-collapse:collapse;font-size:.87rem}
th{color:var(--muted);font-weight:600;text-align:left;padding:.6rem .8rem;border-bottom:1px solid var(--border);font-size:.75rem;text-transform:uppercase;letter-spacing:.5px}
td{padding:.7rem .8rem;border-bottom:1px solid rgba(255,255,255,.04)}
tr:last-child td{border:none}
tr:hover td{background:rgba(255,255,255,.02)}
.bar-wrap{height:6px;background:rgba(255,255,255,.04);border-radius:3px;margin-top:.3rem;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--gl))}
.comm-fill{background:linear-gradient(90deg,var(--purple),rgba(139,92,246,.3))}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sb-logo"><div class="sb-logo-text">⚙️ Admin Console</div><div style="font-size:.72rem;color:var(--muted);margin-top:.2rem">Urban HairPlaza</div></div>
  <nav class="sb-nav">
    <a href="/admin/index.html" class="sb-link"><span>📊</span> Dashboard</a>
    <a href="/admin/salons.html" class="sb-link"><span>🏪</span> Salons</a>
    <a href="/admin/analytics.html" class="sb-link active"><span>📈</span> Analytics</a>
    <a href="/admin/subscriptions.html" class="sb-link"><span>💎</span> Plans</a>
    <a href="/admin/audit.html" class="sb-link"><span>📋</span> Audit Logs</a>
  </nav>
  <div class="sb-footer"><div class="sb-user">Super Admin<span id="sbName">—</span></div><button class="btn-logout" onclick="logout()">Sign Out</button></div>
</aside>
<div class="main">
  <div class="topbar"><div class="topbar-title">Platform Analytics</div></div>
  <div class="content">
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-icon">🏪</div><div class="kpi-label">Total Salons</div><div class="kpi-value" id="kpiSalons">—</div></div>
      <div class="kpi-card"><div class="kpi-icon">📅</div><div class="kpi-label">Total Bookings</div><div class="kpi-value" id="kpiBookings">—</div></div>
      <div class="kpi-card"><div class="kpi-icon">💰</div><div class="kpi-label">Platform Revenue</div><div class="kpi-value" id="kpiRevenue">—</div></div>
      <div class="kpi-card"><div class="kpi-icon">📈</div><div class="kpi-label">Commission Earned</div><div class="kpi-value" id="kpiComm">—</div></div>
    </div>
    <div class="section">
      <div class="section-title">Daily Bookings — Last 30 Days</div>
      <canvas id="bookingLine" height="200"></canvas>
    </div>
    <div class="section">
      <div class="section-title">Revenue & Commission by Salon</div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>Salon</th><th>City</th><th>Bookings</th><th>Revenue</th><th>Commission</th><th>Rating</th></tr></thead>
          <tbody id="revenueTable"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const API = '/api';
const getToken = () => localStorage.getItem('uhp_token');
const getUser = () => { try { return JSON.parse(localStorage.getItem('uhp_user')); } catch { return null; } };
const user = getUser();
if (!user || user.role !== 'admin') window.location.href = '/customer/index.html';
document.getElementById('sbName').textContent = user?.name || '';
function logout() { localStorage.clear(); window.location.href='/customer/index.html'; }

async function load() {
  const r = await fetch(`${API}/admin/analytics`, { headers: { 'Authorization': 'Bearer ' + getToken() } });
  const d = await r.json();

  document.getElementById('kpiSalons').textContent = d.total_salons ?? '—';
  document.getElementById('kpiBookings').textContent = d.total_bookings ?? '—';
  document.getElementById('kpiRevenue').textContent = d.total_revenue != null ? '₹' + Math.round(d.total_revenue).toLocaleString('en-IN') : '—';
  document.getElementById('kpiComm').textContent = d.commission_this_month != null ? '₹' + Math.round(d.commission_this_month).toLocaleString('en-IN') : '—';

  drawLine(d.bookings_by_day || []);

  const rev = d.revenue_by_salon || [];
  const maxRev = Math.max(...rev.map(r => r.revenue), 1);
  const maxComm = Math.max(...rev.map(r => r.commission), 1);
  document.getElementById('revenueTable').innerHTML = rev.map(s => `<tr>
    <td><strong>${s.salon_name}</strong></td>
    <td>${s.city}</td>
    <td>${s.booking_count||0}</td>
    <td>₹${(s.revenue||0).toLocaleString('en-IN')}<div class="bar-wrap"><div class="bar-fill" style="width:${s.revenue/maxRev*100}%"></div></div></td>
    <td>₹${(s.commission||0).toLocaleString('en-IN')}<div class="bar-wrap"><div class="bar-fill comm-fill" style="width:${s.commission/maxComm*100}%"></div></div></td>
    <td>${'★'.repeat(Math.round(s.avg_rating||0))}</td>
  </tr>`).join('') || '<tr><td colspan="6" style="text-align:center;color:var(--muted)">No data</td></tr>';
}

function drawLine(data) {
  const canvas = document.getElementById('bookingLine');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth;
  canvas.height = 200;
  const days = [];
  for (let i = 29; i >= 0; i--) { const d = new Date(); d.setDate(d.getDate()-i); days.push(d.toISOString().split('T')[0]); }
  const counts = days.map(d => { const r=data.find(x=>x.date===d); return r?r.count:0; });
  const max = Math.max(...counts, 1);
  const W=canvas.width, H=canvas.height;
  const pad={t:20,b:30,l:30,r:10};
  const pts = counts.map((v,i) => ({ x: pad.l+(W-pad.l-pad.r)*i/(days.length-1), y: pad.t+(H-pad.t-pad.b)*(1-v/max) }));

  ctx.clearRect(0,0,W,H);
  for (let i=0;i<=4;i++) {
    const y=pad.t+(H-pad.t-pad.b)*i/4;
    ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.fillStyle='#8B8BA0'; ctx.font='10px Outfit'; ctx.textAlign='right';
    ctx.fillText(Math.round(max*(1-i/4)), pad.l-4, y+3);
  }
  const grad=ctx.createLinearGradient(0,pad.t,0,H-pad.b);
  grad.addColorStop(0,'rgba(59,130,246,0.3)'); grad.addColorStop(1,'rgba(59,130,246,0)');
  ctx.fillStyle=grad;
  ctx.beginPath(); ctx.moveTo(pts[0].x,H-pad.b);
  pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x,H-pad.b); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#3B82F6'; ctx.lineWidth=2;
  ctx.beginPath(); pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y)); ctx.stroke();
  for (let i=0;i<days.length;i+=5) {
    const d=new Date(days[i]);
    ctx.fillStyle='#8B8BA0'; ctx.textAlign='center'; ctx.font='10px Outfit';
    ctx.fillText(d.getDate()+'/'+(d.getMonth()+1), pts[i].x, H-8);
  }
}

load();
</script>
</body>
</html>
