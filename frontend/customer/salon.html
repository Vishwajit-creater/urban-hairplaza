<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salon Profile | Urban HairPlaza</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#D4AF37;--gold-light:#F5D878;--gold-dim:rgba(212,175,55,0.15);--bg:#0A0A0F;--card:#12121A;--sidebar:#0D0D15;--text:#F0F0F0;--muted:#8B8BA0;--border:rgba(212,175,55,0.15);--green:#10B981;--red:#EF4444}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text)}
a{color:inherit;text-decoration:none}
nav{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 5%;height:70px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-size:1.4rem;font-weight:700;background:linear-gradient(135deg,var(--gold),var(--gold-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-links{display:flex;gap:2rem}
.nav-links a{color:var(--muted);font-weight:500}
.nav-links a:hover{color:var(--gold)}
.btn{padding:.6rem 1.4rem;border-radius:24px;font-family:'Outfit',sans-serif;font-weight:600;cursor:pointer;transition:all .3s;border:none;font-size:.9rem}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#000}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(212,175,55,0.4)}
/* GALLERY */
.gallery{position:relative;height:400px;background:var(--sidebar)}
.gallery-main{width:100%;height:100%;object-fit:cover}
.gallery-placeholder{height:100%;display:flex;align-items:center;justify-content:center;font-size:5rem;background:linear-gradient(135deg,#1a1a2e,#16213e)}
.gallery-thumbs{position:absolute;bottom:1rem;left:50%;transform:translateX(-50%);display:flex;gap:.5rem}
.gallery-thumb{width:60px;height:45px;object-fit:cover;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:all .2s;opacity:.7}
.gallery-thumb.active{border-color:var(--gold);opacity:1}
.gallery-overlay{position:absolute;bottom:0;left:0;right:0;padding:2rem;background:linear-gradient(to top,rgba(0,0,0,.8),transparent)}
.gallery-name{font-size:2rem;font-weight:800}
.gallery-badge{display:inline-flex;background:var(--gold-dim);border:1px solid var(--gold);color:var(--gold);padding:.25rem .8rem;border-radius:24px;font-size:.78rem;margin-right:.5rem}
/* CONTENT */
.content{display:grid;grid-template-columns:1fr 320px;gap:2rem;padding:2rem 5%;max-width:1200px;margin:0 auto}
@media(max-width:900px){.content{grid-template-columns:1fr}}
/* INFO */
.salon-title{font-size:2rem;font-weight:800;margin-bottom:.5rem}
.salon-address{color:var(--muted);margin-bottom:1rem;display:flex;align-items:center;gap:.4rem}
.rating-row{display:flex;align-items:center;gap.5rem;margin-bottom:1.2rem}
.stars-large{color:var(--gold);font-size:1.2rem;letter-spacing:2px}
.rating-num{font-size:1.3rem;font-weight:700;margin-right:.4rem}
.rating-count{color:var(--muted)}
.salon-desc{color:var(--muted);line-height:1.7;margin-bottom:1.5rem;font-size:.97rem}
.contact-row{display:flex;gap:1.5rem;flex-wrap:wrap;margin-bottom:2rem}
.contact-item{display:flex;align-items:center;gap:.4rem;color:var(--muted);font-size:.9rem}
/* TABS */
.tabs{border-bottom:1px solid var(--border);display:flex;gap:0;margin-bottom:2rem}
.tab-btn{padding:.8rem 1.5rem;background:transparent;border:none;color:var(--muted);font-family:'Outfit',sans-serif;font-size:.95rem;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-weight:500}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-pane{display:none}
.tab-pane.active{display:block}
/* SERVICES */
.service-category{margin-bottom:1.5rem}
.cat-title{font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--gold);margin-bottom:.8rem;padding-bottom:.4rem;border-bottom:1px solid var(--gold-dim)}
.service-item{display:flex;justify-content:space-between;align-items:center;padding:.9rem;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:.6rem;transition:border-color .2s}
.service-item:hover{border-color:rgba(212,175,55,0.4)}
.svc-info .svc-name{font-weight:600;margin-bottom:.2rem}
.svc-info .svc-desc{color:var(--muted);font-size:.85rem}
.svc-info .svc-dur{color:var(--muted);font-size:.82rem;margin-top:.2rem}
.svc-price{font-size:1.1rem;font-weight:700;color:var(--gold);white-space:nowrap}
/* HOURS */
.hours-grid{display:flex;flex-direction:column;gap:.5rem}
.hour-row{display:flex;justify-content:space-between;align-items:center;padding:.7rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:8px}
.hour-row.today{border-color:var(--gold);background:var(--gold-dim)}
.day-name{font-weight:600}
.hour-time{color:var(--muted)}
.closed-badge{color:var(--red);font-size:.85rem}
.open-badge{color:var(--green);font-size:.78rem;background:rgba(16,185,129,0.1);padding:.15rem .5rem;border-radius:12px;margin-left:.5rem}
/* STAFF */
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}
.staff-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem;text-align:center}
.staff-avatar{width:64px;height:64px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;margin-bottom:.8rem}
.staff-name{font-weight:600;margin-bottom:.3rem}
.staff-bio{color:var(--muted);font-size:.82rem;margin-bottom:.8rem;line-height:1.5}
.service-tags{display:flex;flex-wrap:wrap;gap:.3rem;justify-content:center}
.svc-tag{font-size:.72rem;padding:.2rem .6rem;background:var(--gold-dim);border-radius:12px;color:var(--gold)}
/* REVIEWS */
.review-summary{display:flex;gap:2rem;align-items:center;margin-bottom:2rem;flex-wrap:wrap}
.big-rating{text-align:center}
.big-rating .num{font-size:3.5rem;font-weight:800;color:var(--gold);line-height:1}
.big-rating .stars{font-size:1.1rem;color:var(--gold)}
.rating-bars{flex:1}
.bar-row{display:flex;align-items:center;gap.5rem;margin-bottom:.4rem}
.bar-label{width:20px;font-size:.82rem;color:var(--muted);text-align:right;margin-right:.5rem}
.bar-track{flex:1;height:8px;background:rgba(255,255,255,0.05);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:4px;transition:width 1s ease}
.review-cards{display:flex;flex-direction:column;gap:1rem}
.review-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem}
.review-header{display:flex;align-items:center;gap.8rem;margin-bottom:.6rem}
.reviewer-avatar{width:36px;height:36px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;margin-right:.8rem;flex-shrink:0}
.reviewer-name{font-weight:600}
.review-date{color:var(--muted);font-size:.8rem}
.review-stars{color:var(--gold);margin-bottom:.4rem}
.review-comment{color:var(--muted);font-size:.9rem;line-height:1.6}
/* STICKY CARD */
.sticky-card{position:sticky;top:90px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem}
.price-from{color:var(--muted);font-size:.88rem;margin-bottom:.3rem}
.price-amount{font-size:1.8rem;font-weight:800;color:var(--gold);margin-bottom:1.2rem}
.book-btn{width:100%;padding:1rem;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#000;border:none;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .3s;margin-bottom:1rem}
.book-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(212,175,55,0.4)}
.today-hours{margin-bottom:1.2rem}
.today-label{font-size:.82rem;color:var(--muted);margin-bottom:.3rem}
.today-status{font-weight:600;display:flex;align-items:center;gap:.4rem}
.divider{border:none;border-top:1px solid var(--border);margin:1rem 0}
.quick-services{font-size:.82rem;color:var(--muted)}
.qs-item{display:flex;justify-content:space-between;margin-bottom:.4rem;font-size:.87rem}
/* LOADING */
.loading{text-align:center;padding:4rem;color:var(--muted)}
</style>
</head>
<body>
<nav>
  <a href="/customer" class="nav-logo">✂️ Urban HairPlaza</a>
  <div class="nav-links">
    <a href="/customer">← Back to Salons</a>
    <a href="/customer/bookings.html">My Bookings</a>
  </div>
  <div id="navAuth"></div>
</nav>

<div id="pageContent"><div class="loading">Loading salon profile...</div></div>

<script>
const API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? '/api' : 'https://urban-hairplaza.onrender.com/api';
const getUser = () => { try { return JSON.parse(localStorage.getItem('uhp_user')); } catch { return null; } };
const params = new URLSearchParams(location.search);
const salonId = params.get('id');

// Update nav
const user = getUser();
if (user) {
  document.getElementById('navAuth').innerHTML = `<a href="${user.role === 'owner' ? '/owner' : user.role === 'admin' ? '/admin' : '/customer/bookings.html'}" style="color:var(--gold)">${user.name}</a>`;
}

const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const today = new Date().getDay();

function stars(n) {
  n = Math.round(n || 0);
  return '★'.repeat(n) + '☆'.repeat(5 - n);
}

function avatarColor(name) {
  const colors = ['#D4AF37','#8B5CF6','#3B82F6','#10B981','#F59E0B'];
  let h = 0;
  for (let c of name) h = (h * 31 + c.charCodeAt(0)) % colors.length;
  return colors[h];
}

let salonData = null;
let selectedTab = 'services';

async function loadSalon() {
  if (!salonId) { document.getElementById('pageContent').innerHTML = '<div class="loading">❌ No salon ID provided.</div>'; return; }
  try {
    const r = await fetch(`${API}/salons/${salonId}`);
    if (!r.ok) throw new Error('Not found');
    salonData = await r.json();
    render();
  } catch {
    document.getElementById('pageContent').innerHTML = '<div class="loading">❌ Salon not found.</div>';
  }
}

function render() {
  const s = salonData;
  const photos = s.photos || [];
  const primaryPhoto = photos.find(p => p.is_primary) || photos[0];
  const todayHours = s.hours?.find(h => h.day_of_week === today);
  const isOpen = todayHours && !todayHours.is_closed;
  const minPrice = s.services?.reduce((m, sv) => sv.price < m ? sv.price : m, Infinity);
  const ratingDist = [5,4,3,2,1].map(r => ({ r, count: s.reviews?.filter(rv => rv.rating === r).length || 0 }));
  const maxCount = Math.max(...ratingDist.map(d => d.count), 1);

  // Group services by category
  const cats = {};
  (s.services || []).forEach(sv => { if (!cats[sv.category]) cats[sv.category] = []; cats[sv.category].push(sv); });

  document.getElementById('pageContent').innerHTML = `
    <!-- GALLERY -->
    <div class="gallery">
      ${primaryPhoto ? `<img class="gallery-main" id="mainImg" src="${primaryPhoto.url}" alt="${s.name}">` : `<div class="gallery-placeholder">✂️</div>`}
      ${photos.length > 1 ? `<div class="gallery-thumbs">${photos.slice(0,5).map((p,i) => `<img class="gallery-thumb ${i===0?'active':''}" src="${p.url}" onclick="setMain(${i})" id="thumb${i}">`).join('')}</div>` : ''}
      <div class="gallery-overlay">
        <span class="gallery-badge">${s.category}</span>
        <div class="gallery-name">${s.name}</div>
      </div>
    </div>

    <div class="content">
      <!-- MAIN INFO -->
      <div>
        <h1 class="salon-title">${s.name}</h1>
        <div class="salon-address">📍 ${s.address || ''}, ${s.city || ''}</div>
        <div class="rating-row">
          <span class="rating-num">${(s.avg_rating||0).toFixed(1)}</span>
          <span class="stars-large">${stars(s.avg_rating)}</span>
          <span class="rating-count">&nbsp;(${s.review_count} reviews)</span>
        </div>
        <p class="salon-desc">${s.description || ''}</p>
        <div class="contact-row">
          ${s.phone ? `<div class="contact-item">📞 ${s.phone}</div>` : ''}
          ${s.email ? `<div class="contact-item">✉️ ${s.email}</div>` : ''}
          ${s.website ? `<div class="contact-item">🌐 <a href="${s.website}" target="_blank" style="color:var(--gold)">${s.website.replace('https://','')}</a></div>` : ''}
        </div>

        <!-- TABS -->
        <div class="tabs">
          <button class="tab-btn active" onclick="switchTab('services',this)">Services</button>
          <button class="tab-btn" onclick="switchTab('hours',this)">Hours</button>
          <button class="tab-btn" onclick="switchTab('staff',this)">Staff</button>
          <button class="tab-btn" onclick="switchTab('reviews',this)">Reviews</button>
        </div>

        <!-- SERVICES TAB -->
        <div class="tab-pane active" id="tab-services">
          ${Object.entries(cats).map(([cat, svcs]) => `
            <div class="service-category">
              <div class="cat-title">${cat}</div>
              ${svcs.map(sv => `
                <div class="service-item">
                  <div class="svc-info">
                    <div class="svc-name">${sv.name}</div>
                    ${sv.description ? `<div class="svc-desc">${sv.description}</div>` : ''}
                    <div class="svc-dur">⏱ ${sv.duration_min} min</div>
                  </div>
                  <div class="svc-price">₹${sv.price.toLocaleString('en-IN')}</div>
                </div>`).join('')}
            </div>`).join('')}
        </div>

        <!-- HOURS TAB -->
        <div class="tab-pane" id="tab-hours">
          <div class="hours-grid">
            ${DAYS.map((day, i) => {
              const h = s.hours?.find(hh => hh.day_of_week === i);
              const isToday = i === today;
              return `<div class="hour-row ${isToday ? 'today' : ''}">
                <div class="day-name">${day}${isToday ? ' <span class="open-badge">Today</span>' : ''}</div>
                ${h?.is_closed ? `<div class="closed-badge">Closed</div>` : h ? `<div class="hour-time">${h.open_time} – ${h.close_time}</div>` : '<div class="closed-badge">Closed</div>'}
              </div>`;
            }).join('')}
          </div>
        </div>

        <!-- STAFF TAB -->
        <div class="tab-pane" id="tab-staff">
          <div class="staff-grid">
            ${(s.staff || []).map(st => {
              const initials = st.name.split(' ').map(n => n[0]).join('').slice(0,2);
              const color = avatarColor(st.name);
              return `<div class="staff-card">
                <div class="staff-avatar" style="background:${color}20;color:${color};border:2px solid ${color}40">${initials}</div>
                <div class="staff-name">${st.name}</div>
                <div class="staff-bio">${st.bio || ''}</div>
                <div class="service-tags">${(st.services||[]).map(sv => `<span class="svc-tag">${sv.name}</span>`).join('')}</div>
              </div>`;
            }).join('')}
          </div>
        </div>

        <!-- REVIEWS TAB -->
        <div class="tab-pane" id="tab-reviews">
          <div class="review-summary">
            <div class="big-rating">
              <div class="num">${(s.avg_rating||0).toFixed(1)}</div>
              <div class="stars">${stars(s.avg_rating)}</div>
              <div style="color:var(--muted);font-size:.8rem;margin-top:.3rem">${s.review_count} reviews</div>
            </div>
            <div class="rating-bars">
              ${ratingDist.map(d => `
                <div class="bar-row">
                  <div class="bar-label">${d.r}★</div>
                  <div class="bar-track"><div class="bar-fill" style="width:${(d.count/maxCount*100)}%"></div></div>
                  <div style="width:28px;font-size:.8rem;color:var(--muted);margin-left:.5rem">${d.count}</div>
                </div>`).join('')}
            </div>
          </div>
          <div class="review-cards">
            ${!(s.reviews||[]).length ? '<div style="color:var(--muted);text-align:center;padding:2rem">No reviews yet. Be the first!</div>' : ''}
            ${(s.reviews||[]).map(rv => {
              const initials = (rv.customer_name||'?').split(' ').map(n => n[0]).join('').slice(0,2);
              const color = avatarColor(rv.customer_name||'A');
              const date = new Date(rv.created_at).toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'numeric'});
              return `<div class="review-card">
                <div class="review-header">
                  <div class="reviewer-avatar" style="background:${color}20;color:${color}">${initials}</div>
                  <div><div class="reviewer-name">${rv.customer_name}</div><div class="review-date">${date}</div></div>
                </div>
                <div class="review-stars">${'★'.repeat(rv.rating)}${'☆'.repeat(5-rv.rating)}</div>
                <div class="review-comment">${rv.comment || ''}</div>
              </div>`;
            }).join('')}
          </div>
        </div>
      </div>

      <!-- STICKY BOOKING CARD -->
      <div>
        <div class="sticky-card">
          <div class="price-from">Starting from</div>
          <div class="price-amount">₹${isFinite(minPrice) ? minPrice.toLocaleString('en-IN') : 'N/A'}</div>
          <button class="book-btn" onclick="goBook()">Book Appointment →</button>
          <div class="today-hours">
            <div class="today-label">Today's Hours</div>
            <div class="today-status">
              ${isOpen ? `<span style="color:var(--green)">● Open</span> ${todayHours.open_time} – ${todayHours.close_time}` : '<span style="color:var(--red)">● Closed Today</span>'}
            </div>
          </div>
          <hr class="divider">
          <div class="quick-services">
            <div style="font-weight:600;margin-bottom:.6rem;font-size:.9rem">Popular Services</div>
            ${(s.services||[]).slice(0,3).map(sv => `<div class="qs-item"><span>${sv.name}</span><span style="color:var(--gold)">₹${sv.price.toLocaleString('en-IN')}</span></div>`).join('')}
          </div>
        </div>
      </div>
    </div>`;

  // Init gallery
  window._photos = photos;
}

function setMain(idx) {
  const photos = window._photos || [];
  if (!photos[idx]) return;
  document.getElementById('mainImg').src = photos[idx].url;
  document.querySelectorAll('.gallery-thumb').forEach((t, i) => t.classList.toggle('active', i === idx));
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + tab)?.classList.add('active');
}

function goBook() {
  const user = getUser();
  if (!user) { alert('Please login to book an appointment.'); return; }
  window.location.href = `/customer/book.html?salon_id=${salonId}`;
}

loadSalon();
</script>
</body>
</html>
