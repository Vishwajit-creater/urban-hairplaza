<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookings | Owner Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#D4AF37;--gl:#F5D878;--gdim:rgba(212,175,55,0.15);--bg:#0A0A0F;--card:#12121A;--sidebar:#0D0D15;--text:#F0F0F0;--muted:#8B8BA0;--border:rgba(212,175,55,0.15);--green:#10B981;--red:#EF4444;--blue:#3B82F6;--orange:#F59E0B}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
a{color:inherit;text-decoration:none}
.sidebar{width:240px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100}
.sb-logo{padding:1.5rem 1.2rem;border-bottom:1px solid var(--border);font-size:1.2rem;font-weight:700;background:linear-gradient(135deg,var(--gold),var(--gl));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sb-nav{flex:1;padding:.8rem 0}
.sb-link{display:flex;align-items:center;gap:.75rem;padding:.8rem 1.2rem;color:var(--muted);font-size:.9rem;transition:all .2s;border-left:3px solid transparent}
.sb-link:hover{color:var(--text);background:rgba(255,255,255,0.03)}
.sb-link.active{color:var(--gold);border-left-color:var(--gold);background:var(--gdim)}
.sb-footer{padding:1rem 1.2rem;border-top:1px solid var(--border)}
.sb-user{font-size:.85rem;color:var(--muted);margin-bottom:.6rem}
.sb-user span{display:block;color:var(--text);font-weight:600}
.btn-logout{width:100%;padding:.55rem;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.82rem}
.btn-logout:hover{border-color:var(--red);color:var(--red)}
.main{margin-left:240px;flex:1}
.topbar{padding:1rem 2rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;background:rgba(10,10,15,.9);backdrop-filter:blur(12px)}
.topbar-title{font-size:1.3rem;font-weight:700}
.content{padding:1.5rem 2rem}
/* FILTERS */
.filter-bar{display:flex;gap:.8rem;flex-wrap:wrap;margin-bottom:1.5rem;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem}
.filter-input{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text);padding:.55rem .9rem;border-radius:8px;font-family:'Outfit',sans-serif;font-size:.88rem;outline:none}
.filter-input:focus{border-color:var(--gold)}
.filter-input::-webkit-calendar-picker-indicator{filter:invert(1)}
.btn-filter{padding:.55rem 1.2rem;background:var(--gdim);border:1px solid var(--gold);color:var(--gold);border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif;font-weight:600;font-size:.88rem}
/* VIEW TOGGLE */
.view-toggle{display:flex;gap:.5rem;margin-bottom:1rem}
.vt-btn{padding:.45rem 1rem;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'Outfit',sans-serif;font-size:.85rem;transition:all .2s}
.vt-btn.active{background:var(--gdim);border-color:var(--gold);color:var(--gold)}
/* TABLE */
.section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.2rem;margin-bottom:1.5rem}
table{width:100%;border-collapse:collapse;font-size:.87rem}
th{color:var(--muted);font-weight:600;text-align:left;padding:.6rem .8rem;border-bottom:1px solid var(--border);font-size:.76rem;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
td{padding:.7rem .8rem;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle}
tr:last-child td{border:none}
tr:hover td{background:rgba(255,255,255,0.02)}
.badge{padding:.2rem .65rem;border-radius:12px;font-size:.75rem;font-weight:600}
.badge-confirmed{background:rgba(59,130,246,0.15);color:var(--blue)}
.badge-completed{background:rgba(16,185,129,0.15);color:var(--green)}
.badge-cancelled{background:rgba(239,68,68,0.1);color:var(--red)}
.badge-no_show{background:rgba(245,158,11,0.1);color:var(--orange)}
.badge-pending{background:rgba(139,92,246,0.15);color:#8B5CF6}
/* ACTION DROPDOWN */
.action-wrap{position:relative}
.action-btn{padding:.3rem .7rem;background:var(--gdim);border:1px solid var(--border);color:var(--text);border-radius:6px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.8rem}
.action-menu{position:absolute;right:0;top:calc(100%+4px);background:var(--card);border:1px solid var(--border);border-radius:10px;min-width:150px;z-index:50;display:none}
.action-menu.open{display:block}
.action-menu button{display:block;width:100%;padding:.6rem 1rem;text-align:left;background:transparent;border:none;color:var(--text);cursor:pointer;font-family:'Outfit',sans-serif;font-size:.85rem;transition:background .2s}
.action-menu button:hover{background:rgba(255,255,255,0.05)}
/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:.3rem}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:.3rem;margin-bottom:.4rem}
.cal-header div{text-align:center;font-size:.78rem;color:var(--muted);font-weight:600;padding:.3rem}
.cal-col{background:rgba(255,255,255,0.02);border-radius:8px;min-height:200px;padding:.3rem;position:relative}
.time-label{font-size:.68rem;color:var(--muted);position:absolute;left:4px;top:4px}
.cal-booking{background:var(--gdim);border:1px solid var(--gold);border-radius:4px;padding:.2rem .4rem;font-size:.72rem;margin-bottom:.2rem;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cal-booking.completed{background:rgba(16,185,129,0.1);border-color:var(--green)}
.cal-booking.no_show{background:rgba(245,158,11,0.1);border-color:var(--orange)}
/* PAGINATION */
.pagination{display:flex;gap:.4rem;justify-content:center;margin-top:1rem}
.page-btn{padding:.4rem .8rem;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'Outfit',sans-serif;font-size:.85rem}
.page-btn.active{background:var(--gdim);border-color:var(--gold);color:var(--gold)}
/* TOAST */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.8rem 1.2rem;z-index:9999;display:none;font-size:.88rem}
.toast.show{display:flex;align-items:center;gap:.5rem}
.toast.success{border-color:var(--green)}.toast.error{border-color:var(--red)}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sb-logo">✂️ Urban HairPlaza</div>
  <nav class="sb-nav">
    <a href="/owner/index.html" class="sb-link"><span>📊</span> Dashboard</a>
    <a href="/owner/bookings.html" class="sb-link active"><span>📅</span> Bookings</a>
    <a href="/owner/services.html" class="sb-link"><span>💇</span> Services</a>
    <a href="/owner/staff.html" class="sb-link"><span>👥</span> Staff</a>
    <a href="/owner/settings.html" class="sb-link"><span>⚙️</span> Salon Settings</a>
    <a href="/owner/analytics.html" class="sb-link"><span>📈</span> Analytics</a>
  </nav>
  <div class="sb-footer"><div class="sb-user">Owner<span id="sbName">—</span></div><button class="btn-logout" onclick="logout()">Sign Out</button></div>
</aside>
<div class="main">
  <div class="topbar"><div class="topbar-title">Bookings</div><div id="topCount" style="color:var(--muted);font-size:.88rem"></div></div>
  <div class="content">
    <div class="filter-bar">
      <input type="date" class="filter-input" id="fFrom" placeholder="From">
      <input type="date" class="filter-input" id="fTo" placeholder="To">
      <select class="filter-input" id="fStatus">
        <option value="">All Statuses</option>
        <option value="confirmed">Confirmed</option>
        <option value="completed">Completed</option>
        <option value="no_show">No Show</option>
        <option value="cancelled">Cancelled</option>
      </select>
      <select class="filter-input" id="fStaff"><option value="">All Staff</option></select>
      <button class="btn-filter" onclick="applyFilters()">Apply Filters</button>
    </div>
    <div class="view-toggle">
      <button class="vt-btn active" onclick="setView('list',this)">☰ List</button>
      <button class="vt-btn" onclick="setView('calendar',this)">📆 Calendar</button>
    </div>
    <div id="listView">
      <div class="section" style="overflow-x:auto">
        <table>
          <thead><tr><th>#</th><th>Customer</th><th>Services</th><th>Staff</th><th>Date</th><th>Time</th><th>Amount</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="bookTable"><tr><td colspan="9" style="text-align:center;padding:2rem;color:var(--muted)">Loading...</td></tr></tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
    <div id="calendarView" style="display:none">
      <div class="section">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
          <button onclick="shiftWeek(-1)" style="background:transparent;border:1px solid var(--border);color:var(--muted);padding:.4rem .8rem;border-radius:6px;cursor:pointer">← Prev</button>
          <div id="weekLabel" style="font-weight:600"></div>
          <button onclick="shiftWeek(1)" style="background:transparent;border:1px solid var(--border);color:var(--muted);padding:.4rem .8rem;border-radius:6px;cursor:pointer">Next →</button>
        </div>
        <div class="cal-header" id="calHeader"></div>
        <div class="cal-grid" id="calGrid"></div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? '/api' : 'https://urban-hairplaza.onrender.com/api';
const getToken = () => localStorage.getItem('uhp_token');
const getUser = () => { try { return JSON.parse(localStorage.getItem('uhp_user')); } catch { return null; } };
const user = getUser();
if (!user || user.role !== 'owner') window.location.href = '/customer/index.html';
document.getElementById('sbName').textContent = user?.name || '';

const headers = { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' };
let allBookings = [], currentPage = 1, currentView = 'list', weekOffset = 0;
const PER_PAGE = 10;

function toast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => t.classList.remove('show'), 3000);
}
function logout() { localStorage.clear(); window.location.href = '/customer/index.html'; }

async function loadStaff() {
  const r = await fetch(`${API}/owner/staff`, { headers });
  const staff = await r.json();
  const sel = document.getElementById('fStaff');
  staff.forEach(s => { const o = document.createElement('option'); o.value = s.id; o.textContent = s.name; sel.appendChild(o); });
}

async function applyFilters() {
  const params = new URLSearchParams();
  const from = document.getElementById('fFrom').value;
  const to = document.getElementById('fTo').value;
  const status = document.getElementById('fStatus').value;
  const staff = document.getElementById('fStaff').value;
  if (from) params.set('date_from', from);
  if (to) params.set('date_to', to);
  if (status) params.set('status', status);
  if (staff) params.set('staff_id', staff);
  const r = await fetch(`${API}/owner/bookings?${params}`, { headers });
  allBookings = await r.json();
  currentPage = 1;
  document.getElementById('topCount').textContent = allBookings.length + ' bookings';
  renderList();
  if (currentView === 'calendar') renderCalendar();
}

function renderList() {
  const start = (currentPage - 1) * PER_PAGE;
  const page = allBookings.slice(start, start + PER_PAGE);
  const tbody = document.getElementById('bookTable');
  if (!page.length) { tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:2rem;color:var(--muted)">No bookings found</td></tr>'; renderPagination(); return; }
  tbody.innerHTML = page.map((b, i) => `
    <tr>
      <td style="color:var(--muted)">${start + i + 1}</td>
      <td><strong>${b.customer_name}</strong><br><span style="font-size:.75rem;color:var(--muted)">${b.customer_phone||''}</span></td>
      <td>${(b.services||[]).map(s=>s.name).join(', ')||'—'}</td>
      <td>${b.staff_name||'Any'}</td>
      <td>${b.booking_date}</td>
      <td>${b.start_time}–${b.end_time}</td>
      <td style="color:var(--gold)">₹${(b.total_price_snapshot||0).toLocaleString('en-IN')}</td>
      <td><span class="badge badge-${b.status}">${b.status}</span></td>
      <td>
        <div class="action-wrap">
          <button class="action-btn" onclick="toggleMenu(this)">⋯</button>
          <div class="action-menu">
            ${b.status==='confirmed'?`<button onclick="updateStatus(${b.id},'completed')">✅ Complete</button><button onclick="updateStatus(${b.id},'no_show')">⛔ No Show</button>`:''}
            <button onclick="updateStatus(${b.id},'cancelled')">🗑 Cancel</button>
          </div>
        </div>
      </td>
    </tr>`).join('');
  renderPagination();
}

function toggleMenu(btn) {
  document.querySelectorAll('.action-menu').forEach(m => { if (m !== btn.nextElementSibling) m.classList.remove('open'); });
  btn.nextElementSibling.classList.toggle('open');
}
document.addEventListener('click', e => { if (!e.target.classList.contains('action-btn')) document.querySelectorAll('.action-menu').forEach(m => m.classList.remove('open')); });

function renderPagination() {
  const total = Math.ceil(allBookings.length / PER_PAGE);
  const pag = document.getElementById('pagination');
  if (total <= 1) { pag.innerHTML = ''; return; }
  pag.innerHTML = Array.from({length:total},(_,i)=>`<button class="page-btn ${i+1===currentPage?'active':''}" onclick="goPage(${i+1})">${i+1}</button>`).join('');
}
function goPage(p) { currentPage = p; renderList(); }

async function updateStatus(id, status) {
  const r = await fetch(`${API}/bookings/${id}/status`, { method:'PATCH', headers, body:JSON.stringify({status}) });
  if (r.ok) { toast('✅ Status updated'); applyFilters(); } else toast('❌ Failed','error');
}

// CALENDAR
function setView(v, btn) {
  currentView = v;
  document.querySelectorAll('.vt-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('listView').style.display = v==='list'?'block':'none';
  document.getElementById('calendarView').style.display = v==='calendar'?'block':'none';
  if (v==='calendar') renderCalendar();
}

const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

function getWeekDates() {
  const now = new Date();
  const day = now.getDay() || 7;
  const monday = new Date(now);
  monday.setDate(now.getDate() - day + 1 + weekOffset * 7);
  return Array.from({length:7},(_,i)=>{ const d=new Date(monday); d.setDate(monday.getDate()+i); return d; });
}

function shiftWeek(n) { weekOffset += n; renderCalendar(); }

async function renderCalendar() {
  const dates = getWeekDates();
  const from = dates[0].toISOString().split('T')[0];
  const to = dates[6].toISOString().split('T')[0];
  document.getElementById('weekLabel').textContent = `${from} — ${to}`;
  const r = await fetch(`${API}/owner/bookings?date_from=${from}&date_to=${to}`, { headers });
  const bookings = await r.json();
  const header = document.getElementById('calHeader');
  const grid = document.getElementById('calGrid');
  header.innerHTML = dates.map((d,i) => `<div>${DAYS[i]}<br><small style="color:var(--muted)">${d.getDate()}</small></div>`).join('');
  grid.innerHTML = dates.map(d => {
    const dateStr = d.toISOString().split('T')[0];
    const dayBookings = bookings.filter(b => b.booking_date === dateStr);
    return `<div class="cal-col">
      ${dayBookings.map(b=>`<div class="cal-booking ${b.status}" title="${b.customer_name}: ${b.start_time}">${b.start_time} ${b.customer_name}</div>`).join('')}
      ${!dayBookings.length ? '<div style="color:var(--muted);font-size:.75rem;text-align:center;padding-top:1rem">—</div>' : ''}
    </div>`;
  }).join('');
}

async function init() {
  await loadStaff();
  const today = new Date();
  const from = new Date(); from.setDate(today.getDate()-7);
  document.getElementById('fFrom').value = from.toISOString().split('T')[0];
  document.getElementById('fTo').value = new Date(today.getTime()+14*86400000).toISOString().split('T')[0];
  await applyFilters();
}
init();
</script>
</body>
</html>
