<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salon Settings | Owner Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#D4AF37;--gl:#F5D878;--gdim:rgba(212,175,55,0.15);--bg:#0A0A0F;--card:#12121A;--sidebar:#0D0D15;--text:#F0F0F0;--muted:#8B8BA0;--border:rgba(212,175,55,0.15);--green:#10B981;--red:#EF4444}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
a{color:inherit;text-decoration:none}
.sidebar{width:240px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100}
.sb-logo{padding:1.5rem 1.2rem;border-bottom:1px solid var(--border);font-size:1.2rem;font-weight:700;background:linear-gradient(135deg,var(--gold),var(--gl));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sb-nav{flex:1;padding:.8rem 0}
.sb-link{display:flex;align-items:center;gap:.75rem;padding:.8rem 1.2rem;color:var(--muted);font-size:.9rem;transition:all .2s;border-left:3px solid transparent}
.sb-link:hover{color:var(--text);background:rgba(255,255,255,0.03)}
.sb-link.active{color:var(--gold);border-left-color:var(--gold);background:var(--gdim)}
.sb-footer{padding:1rem 1.2rem;border-top:1px solid var(--border)}
.sb-user{font-size:.85rem;color:var(--muted);margin-bottom:.6rem}
.sb-user span{display:block;color:var(--text);font-weight:600}
.btn-logout{width:100%;padding:.55rem;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.82rem}
.btn-logout:hover{border-color:var(--red);color:var(--red)}
.main{margin-left:240px;flex:1}
.topbar{padding:1rem 2rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;background:rgba(10,10,15,.9);backdrop-filter:blur(12px)}
.topbar-title{font-size:1.3rem;font-weight:700}
.content{padding:1.5rem 2rem;max-width:860px}
.section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1.5rem}
.section-title{font-size:1rem;font-weight:700;margin-bottom:1.2rem;padding-bottom:.6rem;border-bottom:1px solid var(--border)}
.form-group{margin-bottom:1rem}
label{display:block;font-size:.83rem;color:var(--muted);margin-bottom:.3rem;font-weight:500}
input,select,textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);padding:.7rem .9rem;border-radius:8px;font-family:'Outfit',sans-serif;font-size:.9rem;outline:none;transition:border-color .3s}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
select option{background:var(--card)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}}
.btn-save{padding:.7rem 1.8rem;background:linear-gradient(135deg,var(--gold),var(--gl));color:#000;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.95rem;transition:all .2s}
.btn-save:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(212,175,55,0.3)}
/* HOURS GRID */
.hours-grid{display:flex;flex-direction:column;gap:.5rem}
.hour-row{display:grid;grid-template-columns:100px 1fr 1fr 80px;gap.8rem;gap:.8rem;align-items:center;padding:.5rem .2rem}
.day-label{font-size:.88rem;font-weight:600}
.hour-toggle{position:relative;width:44px;height:24px;cursor:pointer}
.hour-toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{display:block;width:44px;height:24px;background:rgba(255,255,255,.08);border-radius:12px;transition:background .2s}
.hour-toggle input:checked + .toggle-track{background:var(--green)}
.toggle-thumb{position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:left .2s;pointer-events:none}
.hour-toggle input:checked ~ .toggle-thumb{left:23px}
/* PHOTOS */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap.8rem;gap:.8rem;margin-bottom:1rem}
.photo-card{position:relative;border-radius:10px;overflow:hidden;border:2px solid var(--border);aspect-ratio:4/3;cursor:pointer}
.photo-card.primary{border-color:var(--gold)}
.photo-card img{width:100%;height:100%;object-fit:cover}
.photo-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;gap.4rem;gap:.4rem;flex-direction:column}
.photo-card:hover .photo-overlay{display:flex}
.photo-btn{background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.3);color:#fff;padding:.25rem .6rem;border-radius:6px;font-size:.7rem;cursor:pointer;font-family:'Outfit',sans-serif}
.add-photo-card{border:2px dashed var(--border);border-radius:10px;aspect-ratio:4/3;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;color:var(--muted);font-size:.85rem}
.add-photo-card:hover{border-color:var(--gold);color:var(--gold)}
.add-photo-icon{font-size:1.8rem;margin-bottom:.3rem}
.add-url-row{display:flex;gap.5rem;gap:.5rem;margin-bottom:.8rem}
.add-url-input{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);padding:.55rem .8rem;border-radius:8px;font-family:'Outfit',sans-serif;font-size:.85rem;outline:none}
.btn-add-photo{padding:.55rem 1rem;background:var(--gdim);border:1px solid var(--gold);color:var(--gold);border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.85rem;white-space:nowrap}
/* TOAST */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.8rem 1.2rem;z-index:9999;display:none;font-size:.88rem}
.toast.show{display:flex;align-items:center;gap:.5rem}
.toast.success{border-color:var(--green)}.toast.error{border-color:var(--red)}
.alert{background:rgba(212,175,55,.1);border:1px solid var(--gold);border-radius:10px;padding:.8rem 1rem;margin-bottom:1rem;font-size:.88rem}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sb-logo">✂️ Urban HairPlaza</div>
  <nav class="sb-nav">
    <a href="/owner/index.html" class="sb-link"><span>📊</span> Dashboard</a>
    <a href="/owner/bookings.html" class="sb-link"><span>📅</span> Bookings</a>
    <a href="/owner/services.html" class="sb-link"><span>💇</span> Services</a>
    <a href="/owner/staff.html" class="sb-link"><span>👥</span> Staff</a>
    <a href="/owner/settings.html" class="sb-link active"><span>⚙️</span> Salon Settings</a>
    <a href="/owner/analytics.html" class="sb-link"><span>📈</span> Analytics</a>
  </nav>
  <div class="sb-footer"><div class="sb-user">Owner<span id="sbName">—</span></div><button class="btn-logout" onclick="logout()">Sign Out</button></div>
</aside>
<div class="main">
  <div class="topbar"><div class="topbar-title">Salon Settings</div></div>
  <div class="content">
    <div id="statusAlert"></div>

    <!-- BASIC INFO -->
    <div class="section">
      <div class="section-title">Basic Information</div>
      <div class="form-grid">
        <div class="form-group"><label>Salon Name</label><input id="fName" placeholder="Glamour Studio"></div>
        <div class="form-group"><label>Category</label>
          <select id="fCat">
            <option>Hair</option><option>Barbershop</option><option>Spa & Wellness</option><option>Nail Studio</option><option>Beauty & Makeup</option>
          </select></div>
        <div class="form-group"><label>Phone</label><input id="fPhone" placeholder="+91 XXXXX XXXXX"></div>
        <div class="form-group"><label>Email</label><input type="email" id="fEmail" placeholder="salon@example.com"></div>
        <div class="form-group"><label>City</label><input id="fCity"></div>
        <div class="form-group"><label>Website</label><input id="fWebsite" placeholder="https://mysalon.com"></div>
      </div>
      <div class="form-group"><label>Address</label><input id="fAddress"></div>
      <div class="form-group"><label>Description</label><textarea id="fDesc" rows="3"></textarea></div>
      <button class="btn-save" onclick="saveBasic()">💾 Save Changes</button>
    </div>

    <!-- HOURS -->
    <div class="section">
      <div class="section-title">Operating Hours</div>
      <div class="hours-grid" id="hoursGrid"></div>
      <button class="btn-save" style="margin-top:1rem" onclick="saveHours()">💾 Save Hours</button>
    </div>

    <!-- PHOTOS -->
    <div class="section">
      <div class="section-title">Gallery Photos</div>
      <div class="add-url-row">
        <input class="add-url-input" id="newPhotoUrl" placeholder="https://images.unsplash.com/photo-...">
        <input class="add-url-input" id="newPhotoCaption" placeholder="Caption (optional)" style="max-width:180px">
        <button class="btn-add-photo" onclick="addPhoto()">+ Add Photo</button>
      </div>
      <div class="photo-grid" id="photoGrid"></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const API = '/api';
const getToken = () => localStorage.getItem('uhp_token');
const getUser = () => { try { return JSON.parse(localStorage.getItem('uhp_user')); } catch { return null; } };
const user = getUser();
if (!user || user.role !== 'owner') window.location.href = '/customer/index.html';
document.getElementById('sbName').textContent = user?.name || '';
const headers = { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' };
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
let salon = null;

function toast(msg, type='success') { const t=document.getElementById('toast'); t.textContent=msg; t.className=`toast show ${type}`; setTimeout(()=>t.classList.remove('show'),3000); }
function logout() { localStorage.clear(); window.location.href='/customer/index.html'; }

async function load() {
  const r = await fetch(`${API}/owner/salon`, { headers });
  salon = await r.json();

  // Status alert
  if (salon.status === 'pending') {
    document.getElementById('statusAlert').innerHTML = '<div class="alert">⏳ Your salon is <strong>pending approval</strong>. It will not appear in customer search until an admin approves it.</div>';
  } else if (salon.status === 'rejected') {
    document.getElementById('statusAlert').innerHTML = `<div class="alert" style="border-color:var(--red);background:rgba(239,68,68,.1)">❌ Your salon was <strong>rejected</strong>. Reason: ${salon.rejection_reason || 'Not specified'}. Update your details and contact support.</div>`;
  }

  // Populate basic fields
  document.getElementById('fName').value = salon.name || '';
  document.getElementById('fCat').value = salon.category || 'Hair';
  document.getElementById('fPhone').value = salon.phone || '';
  document.getElementById('fEmail').value = salon.email || '';
  document.getElementById('fCity').value = salon.city || '';
  document.getElementById('fWebsite').value = salon.website || '';
  document.getElementById('fAddress').value = salon.address || '';
  document.getElementById('fDesc').value = salon.description || '';

  // Hours
  renderHours(salon.hours || []);

  // Photos
  renderPhotos(salon.photos || []);
}

function renderHours(hours) {
  document.getElementById('hoursGrid').innerHTML = DAYS.map((day, i) => {
    const h = hours.find(hh => hh.day_of_week === i) || { is_closed: 1, open_time: '09:00', close_time: '20:00' };
    return `<div class="hour-row">
      <div class="day-label">${day.slice(0,3)}</div>
      <input type="time" id="ot${i}" value="${h.open_time || '09:00'}" ${h.is_closed?'disabled':''} style="max-width:130px">
      <input type="time" id="ct${i}" value="${h.close_time || '20:00'}" ${h.is_closed?'disabled':''} style="max-width:130px">
      <label class="hour-toggle" title="Closed on this day">
        <input type="checkbox" id="cl${i}" ${h.is_closed?'checked':''} onchange="toggleClosed(${i},this)">
        <span class="toggle-track"></span>
        <span class="toggle-thumb"></span>
      </label>
    </div>`;
  }).join('');
}

function toggleClosed(day, cb) {
  document.getElementById('ot'+day).disabled = cb.checked;
  document.getElementById('ct'+day).disabled = cb.checked;
}

function renderPhotos(photos) {
  document.getElementById('photoGrid').innerHTML =
    photos.map(p => `<div class="photo-card ${p.is_primary?'primary':''}" id="ph${p.id}">
      <img src="${p.url}" alt="${p.caption||''}" onerror="this.src='https://images.unsplash.com/photo-1560066263-57e9a3d3c0ba?w=300'">
      <div class="photo-overlay">
        ${!p.is_primary ? `<button class="photo-btn" onclick="setPrimary(${p.id})">⭐ Set Primary</button>` : '<div style="color:var(--gold);font-size:.7rem">⭐ Primary</div>'}
        <button class="photo-btn" onclick="deletePhoto(${p.id})" style="border-color:var(--red);color:var(--red)">🗑 Remove</button>
      </div>
    </div>`).join('');
}

async function saveBasic() {
  const body = {
    name: document.getElementById('fName').value.trim(),
    category: document.getElementById('fCat').value,
    phone: document.getElementById('fPhone').value.trim(),
    email: document.getElementById('fEmail').value.trim(),
    city: document.getElementById('fCity').value.trim(),
    website: document.getElementById('fWebsite').value.trim(),
    address: document.getElementById('fAddress').value.trim(),
    description: document.getElementById('fDesc').value.trim(),
  };
  const r = await fetch(`${API}/salons/${salon.id}`, { method:'PATCH', headers, body:JSON.stringify(body) });
  if (r.ok) toast('✅ Salon info saved!');
  else { const d=await r.json(); toast('❌ '+(d.error||'Failed'),'error'); }
}

async function saveHours() {
  const hours = DAYS.map((_,i) => ({
    day_of_week: i,
    open_time: document.getElementById('ot'+i).value,
    close_time: document.getElementById('ct'+i).value,
    is_closed: document.getElementById('cl'+i).checked ? 1 : 0,
  }));
  const r = await fetch(`${API}/owner/salon/hours`, { method:'PATCH', headers, body:JSON.stringify({hours}) });
  if (r.ok) toast('✅ Hours saved!'); else toast('❌ Failed to save hours','error');
}

async function addPhoto() {
  const url = document.getElementById('newPhotoUrl').value.trim();
  const caption = document.getElementById('newPhotoCaption').value.trim();
  if (!url) { toast('Enter a photo URL','error'); return; }
  const r = await fetch(`${API}/owner/salon/photos`, { method:'PATCH', headers, body:JSON.stringify({action:'add',url,caption}) });
  if (r.ok) { const p=await r.json(); salon.photos.push(p); renderPhotos(salon.photos||[]); document.getElementById('newPhotoUrl').value=''; toast('✅ Photo added'); }
  else toast('❌ Failed to add photo','error');
}

async function deletePhoto(id) {
  if (!confirm('Remove this photo?')) return;
  const r = await fetch(`${API}/owner/salon/photos`, { method:'PATCH', headers, body:JSON.stringify({action:'delete',photo_id:id}) });
  if (r.ok) { salon.photos = salon.photos.filter(p=>p.id!==id); renderPhotos(salon.photos); toast('✅ Photo removed'); }
  else toast('❌ Failed','error');
}

async function setPrimary(id) {
  const r = await fetch(`${API}/owner/salon/photos`, { method:'PATCH', headers, body:JSON.stringify({action:'set_primary',photo_id:id}) });
  if (r.ok) { salon.photos.forEach(p=>p.is_primary=p.id===id?1:0); renderPhotos(salon.photos); toast('✅ Primary photo set'); }
  else toast('❌ Failed','error');
}

load();
</script>
</body>
</html>
