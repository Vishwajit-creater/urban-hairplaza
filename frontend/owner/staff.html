<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff | Owner Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#D4AF37;--gl:#F5D878;--gdim:rgba(212,175,55,0.15);--bg:#0A0A0F;--card:#12121A;--sidebar:#0D0D15;--text:#F0F0F0;--muted:#8B8BA0;--border:rgba(212,175,55,0.15);--green:#10B981;--red:#EF4444;--orange:#F59E0B}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
a{color:inherit;text-decoration:none}
.sidebar{width:240px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100}
.sb-logo{padding:1.5rem 1.2rem;border-bottom:1px solid var(--border);font-size:1.2rem;font-weight:700;background:linear-gradient(135deg,var(--gold),var(--gl));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sb-nav{flex:1;padding:.8rem 0}
.sb-link{display:flex;align-items:center;gap:.75rem;padding:.8rem 1.2rem;color:var(--muted);font-size:.9rem;transition:all .2s;border-left:3px solid transparent}
.sb-link:hover{color:var(--text);background:rgba(255,255,255,0.03)}
.sb-link.active{color:var(--gold);border-left-color:var(--gold);background:var(--gdim)}
.sb-footer{padding:1rem 1.2rem;border-top:1px solid var(--border)}
.sb-user{font-size:.85rem;color:var(--muted);margin-bottom:.6rem}
.sb-user span{display:block;color:var(--text);font-weight:600}
.btn-logout{width:100%;padding:.55rem;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.82rem}
.btn-logout:hover{border-color:var(--red);color:var(--red)}
.main{margin-left:240px;flex:1}
.topbar{padding:1rem 2rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;background:rgba(10,10,15,.9);backdrop-filter:blur(12px)}
.topbar-title{font-size:1.3rem;font-weight:700}
.btn-primary{padding:.6rem 1.4rem;background:linear-gradient(135deg,var(--gold),var(--gl));color:#000;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.9rem}
.btn-primary:hover{transform:translateY(-2px)}
.content{padding:1.5rem 2rem}
/* STAFF GRID */
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem}
.staff-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.3rem;transition:border-color .2s}
.staff-card:hover{border-color:rgba(212,175,55,.4)}
.staff-card.inactive{opacity:.6}
.staff-header{display:flex;align-items:center;gap.8rem;gap:.8rem;margin-bottom:.8rem}
.avatar-lg{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:700;flex-shrink:0}
.staff-meta .name{font-size:1rem;font-weight:700}
.staff-meta .contact{color:var(--muted);font-size:.8rem;margin-top:.2rem}
.staff-bio{color:var(--muted);font-size:.83rem;margin-bottom:.8rem;line-height:1.5}
.service-tags{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.8rem}
.s-tag{font-size:.72rem;padding:.2rem .55rem;background:var(--gdim);border-radius:12px;color:var(--gold)}
.staff-actions{display:flex;gap:.4rem;flex-wrap:wrap;align-items:center;justify-content:space-between}
.btn-sm{padding:.35rem .8rem;border-radius:6px;font-family:'Outfit',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.btn-edit{background:var(--gdim);border:1px solid var(--gold);color:var(--gold)}
.btn-edit:hover{background:var(--gold);color:#000}
.btn-leave{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:var(--orange)}
.btn-leave:hover{background:var(--orange);color:#000}
.btn-deact{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:var(--red);font-size:.75rem}
/* LEAVE PANEL */
.leave-panel{margin-top:.8rem;border-top:1px solid var(--border);padding-top:.8rem;display:none}
.leave-panel.open{display:block}
.leave-input-row{display:flex;gap:.4rem;margin-bottom:.5rem}
.leave-input{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);padding:.4rem .7rem;border-radius:6px;font-family:'Outfit',sans-serif;font-size:.83rem;outline:none}
.leave-input::-webkit-calendar-picker-indicator{filter:invert(1)}
.btn-add-leave{padding:.4rem .8rem;background:var(--gdim);border:1px solid var(--gold);color:var(--gold);border-radius:6px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.8rem}
.leave-chip{display:inline-flex;align-items:center;gap:.3rem;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);color:var(--orange);padding:.2rem .6rem;border-radius:12px;font-size:.75rem;margin:.15rem}
.leave-chip button{background:none;border:none;color:var(--orange);cursor:pointer;font-size:.9rem;padding:0;line-height:1}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:1000;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.8rem;width:100%;max-width:500px;animation:mi .3s ease;max-height:90vh;overflow-y:auto}
@keyframes mi{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-title{font-size:1.2rem;font-weight:700;margin-bottom:1.2rem}
.form-group{margin-bottom:1rem}
label{display:block;font-size:.83rem;color:var(--muted);margin-bottom:.3rem;font-weight:500}
input,textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);padding:.7rem .9rem;border-radius:8px;font-family:'Outfit',sans-serif;font-size:.9rem;outline:none;transition:border-color .3s}
input:focus,textarea:focus{border-color:var(--gold)}
.services-check{max-height:200px;overflow-y:auto;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:8px;padding:.6rem}
.svc-check-item{display:flex;align-items:center;gap.5rem;padding:.3rem .5rem;cursor:pointer}
.svc-check-item:hover{background:rgba(255,255,255,.03)}
.svc-check-item input{width:16px;height:16px;accent-color:var(--gold);cursor:pointer}
.svc-check-item label{color:var(--text);font-size:.87rem;cursor:pointer;margin:0}
.modal-actions{display:flex;gap:.6rem;justify-content:flex-end;margin-top:1.2rem}
.btn-cancel-modal{padding:.6rem 1.2rem;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif}
.btn-save{padding:.6rem 1.4rem;background:linear-gradient(135deg,var(--gold),var(--gl));color:#000;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.8rem 1.2rem;z-index:9999;display:none;font-size:.88rem}
.toast.show{display:flex;align-items:center;gap:.5rem}
.toast.success{border-color:var(--green)}.toast.error{border-color:var(--red)}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sb-logo">✂️ Urban HairPlaza</div>
  <nav class="sb-nav">
    <a href="/owner/index.html" class="sb-link"><span>📊</span> Dashboard</a>
    <a href="/owner/bookings.html" class="sb-link"><span>📅</span> Bookings</a>
    <a href="/owner/services.html" class="sb-link"><span>💇</span> Services</a>
    <a href="/owner/staff.html" class="sb-link active"><span>👥</span> Staff</a>
    <a href="/owner/settings.html" class="sb-link"><span>⚙️</span> Salon Settings</a>
    <a href="/owner/analytics.html" class="sb-link"><span>📈</span> Analytics</a>
  </nav>
  <div class="sb-footer"><div class="sb-user">Owner<span id="sbName">—</span></div><button class="btn-logout" onclick="logout()">Sign Out</button></div>
</aside>
<div class="main">
  <div class="topbar">
    <div class="topbar-title">Staff Management</div>
    <button class="btn-primary" onclick="openModal()">+ Add Staff</button>
  </div>
  <div class="content">
    <div class="staff-grid" id="staffGrid"><div style="color:var(--muted)">Loading...</div></div>
  </div>
</div>

<!-- STAFF MODAL -->
<div class="modal-overlay" id="staffModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Add Staff Member</div>
    <input type="hidden" id="editId">
    <div class="form-group"><label>Full Name *</label><input id="fName" placeholder="Priya Sharma"></div>
    <div class="form-group"><label>Phone</label><input id="fPhone" placeholder="+91 98765 43210"></div>
    <div class="form-group"><label>Email</label><input type="email" id="fEmail" placeholder="staff@salon.com"></div>
    <div class="form-group"><label>Bio</label><textarea id="fBio" rows="2" placeholder="Brief description"></textarea></div>
    <div class="form-group"><label>Assigned Services</label><div class="services-check" id="serviceChecks"></div></div>
    <div id="modalErr" style="color:var(--red);font-size:.82rem;margin-bottom:.6rem;display:none"></div>
    <div class="modal-actions">
      <button class="btn-cancel-modal" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveStaff()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? '/api' : 'https://urban-hairplaza.onrender.com/api';
const getToken = () => localStorage.getItem('uhp_token');
const getUser = () => { try { return JSON.parse(localStorage.getItem('uhp_user')); } catch { return null; } };
const user = getUser();
if (!user || user.role !== 'owner') window.location.href = '/customer/index.html';
document.getElementById('sbName').textContent = user?.name || '';
const headers = { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' };
let staff = [], allServices = [];
const COLORS = ['#D4AF37','#8B5CF6','#3B82F6','#10B981','#F59E0B','#EC4899'];
function getColor(name) { let h=0; for(let c of name) h=(h*31+c.charCodeAt(0))%COLORS.length; return COLORS[h]; }
function toast(msg, type='success') { const t=document.getElementById('toast'); t.textContent=msg; t.className=`toast show ${type}`; setTimeout(()=>t.classList.remove('show'),3000); }
function logout() { localStorage.clear(); window.location.href='/customer/index.html'; }

async function load() {
  const [sRes, svRes] = await Promise.all([
    fetch(`${API}/owner/staff`, { headers }),
    fetch(`${API}/owner/services`, { headers }),
  ]);
  staff = await sRes.json();
  allServices = (await svRes.json()).filter(s => s.is_active);
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('staffGrid');
  if (!staff.length) { grid.innerHTML = '<div style="color:var(--muted);padding:2rem">No staff yet. Add your first team member!</div>'; return; }
  grid.innerHTML = staff.map(s => {
    const initials = s.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
    const color = getColor(s.name);
    const leaves = s._leaves || [];
    return `<div class="staff-card ${s.is_active?'':'inactive'}" id="scard${s.id}">
      <div class="staff-header">
        <div class="avatar-lg" style="background:${color}20;color:${color};border:2px solid ${color}40">${initials}</div>
        <div class="staff-meta">
          <div class="name">${s.name} ${s.is_active?'':' <span style="font-size:.7rem;color:var(--red)">(Inactive)</span>'}</div>
          <div class="contact">${s.phone||''} ${s.email?'· '+s.email:''}</div>
        </div>
      </div>
      <div class="staff-bio">${s.bio||''}</div>
      <div class="service-tags">${(s.services||[]).map(sv=>`<span class="s-tag">${sv.name}</span>`).join('')}${!s.services?.length?'<span style="font-size:.78rem;color:var(--muted)">No services assigned</span>':''}</div>
      <div class="staff-actions">
        <div style="display:flex;gap:.4rem">
          <button class="btn-sm btn-edit" onclick="openModal(${s.id})">✏️ Edit</button>
          <button class="btn-sm btn-leave" onclick="toggleLeave(${s.id})">📅 Leaves</button>
          <button class="btn-sm btn-deact" onclick="toggleActive(${s.id},${s.is_active})">${s.is_active?'Deactivate':'Activate'}</button>
        </div>
      </div>
      <div class="leave-panel" id="lp${s.id}">
        <div style="font-size:.82rem;font-weight:600;color:var(--muted);margin-bottom:.5rem">Leave Dates</div>
        <div class="leave-input-row">
          <input type="date" class="leave-input" id="li${s.id}">
          <input type="text" class="leave-input" placeholder="Reason" id="lr${s.id}" style="max-width:120px">
          <button class="btn-add-leave" onclick="addLeave(${s.id})">+ Add</button>
        </div>
        <div id="leaveList${s.id}">Loading...</div>
      </div>
    </div>`;
  }).join('');
}

async function toggleLeave(id) {
  const panel = document.getElementById('lp' + id);
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) await loadLeaves(id);
}

async function loadLeaves(staffId) {
  const r = await fetch(`${API}/owner/staff/${staffId}/leaves`, { headers });
  const leaves = await r.json();
  document.getElementById('leaveList' + staffId).innerHTML = leaves.length
    ? leaves.map(l => `<span class="leave-chip">${l.leave_date} ${l.reason?'('+l.reason+')':''}<button onclick="removeLeave(${staffId},${l.id})">×</button></span>`).join('')
    : '<span style="color:var(--muted);font-size:.8rem">No leaves scheduled</span>';
}

async function addLeave(staffId) {
  const date = document.getElementById('li'+staffId).value;
  const reason = document.getElementById('lr'+staffId).value;
  if (!date) { toast('Pick a date first','error'); return; }
  const r = await fetch(`${API}/owner/staff/${staffId}/leaves`, { method:'POST', headers, body:JSON.stringify({leave_date:date,reason}) });
  if (r.ok) { toast('✅ Leave added'); loadLeaves(staffId); } else toast('❌ Failed','error');
}

async function removeLeave(staffId, leaveId) {
  await fetch(`${API}/owner/staff/${staffId}/leaves/${leaveId}`, { method:'DELETE', headers });
  loadLeaves(staffId);
}

async function toggleActive(id, active) {
  const r = await fetch(`${API}/owner/staff/${id}`, { method:'PUT', headers, body:JSON.stringify({is_active:active?0:1}) });
  if (r.ok) { toast('✅ Updated'); load(); } else toast('❌ Failed','error');
}

function openModal(id) {
  document.getElementById('editId').value = id || '';
  document.getElementById('modalErr').style.display = 'none';
  // Build service checkboxes
  document.getElementById('serviceChecks').innerHTML = allServices.map(s =>
    `<div class="svc-check-item"><input type="checkbox" id="cs${s.id}" value="${s.id}"><label for="cs${s.id}">${s.name}</label></div>`
  ).join('');
  if (id) {
    const s = staff.find(st => st.id === id);
    document.getElementById('modalTitle').textContent = 'Edit Staff';
    document.getElementById('fName').value = s.name;
    document.getElementById('fPhone').value = s.phone||'';
    document.getElementById('fEmail').value = s.email||'';
    document.getElementById('fBio').value = s.bio||'';
    const svcIds = (s.services||[]).map(sv => sv.id);
    svcIds.forEach(sid => { const cb = document.getElementById('cs'+sid); if(cb) cb.checked = true; });
  } else {
    document.getElementById('modalTitle').textContent = 'Add Staff Member';
    ['fName','fPhone','fEmail','fBio'].forEach(i => document.getElementById(i).value = '');
  }
  document.getElementById('staffModal').classList.add('open');
}
function closeModal() { document.getElementById('staffModal').classList.remove('open'); }

async function saveStaff() {
  const id = document.getElementById('editId').value;
  const errEl = document.getElementById('modalErr');
  const serviceIds = [...document.querySelectorAll('#serviceChecks input:checked')].map(cb => parseInt(cb.value));
  const body = {
    name: document.getElementById('fName').value.trim(),
    phone: document.getElementById('fPhone').value.trim(),
    email: document.getElementById('fEmail').value.trim(),
    bio: document.getElementById('fBio').value.trim(),
    service_ids: serviceIds,
  };
  if (!body.name) { errEl.textContent = 'Name is required.'; errEl.style.display = 'block'; return; }
  const url = id ? `${API}/owner/staff/${id}` : `${API}/owner/staff`;
  const method = id ? 'PUT' : 'POST';
  const r = await fetch(url, { method, headers, body: JSON.stringify(body) });
  const data = await r.json();
  if (!r.ok) { errEl.textContent = data.error; errEl.style.display = 'block'; return; }
  closeModal();
  toast(id ? '✅ Staff updated' : '✅ Staff added');
  load();
}

load();
</script>
</body>
</html>
