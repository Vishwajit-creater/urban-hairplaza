<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Services | Owner Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#D4AF37;--gl:#F5D878;--gdim:rgba(212,175,55,0.15);--bg:#0A0A0F;--card:#12121A;--sidebar:#0D0D15;--text:#F0F0F0;--muted:#8B8BA0;--border:rgba(212,175,55,0.15);--green:#10B981;--red:#EF4444}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
a{color:inherit;text-decoration:none}
.sidebar{width:240px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100}
.sb-logo{padding:1.5rem 1.2rem;border-bottom:1px solid var(--border);font-size:1.2rem;font-weight:700;background:linear-gradient(135deg,var(--gold),var(--gl));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sb-nav{flex:1;padding:.8rem 0}
.sb-link{display:flex;align-items:center;gap:.75rem;padding:.8rem 1.2rem;color:var(--muted);font-size:.9rem;transition:all .2s;border-left:3px solid transparent}
.sb-link:hover{color:var(--text);background:rgba(255,255,255,0.03)}
.sb-link.active{color:var(--gold);border-left-color:var(--gold);background:var(--gdim)}
.sb-footer{padding:1rem 1.2rem;border-top:1px solid var(--border)}
.sb-user{font-size:.85rem;color:var(--muted);margin-bottom:.6rem}
.sb-user span{display:block;color:var(--text);font-weight:600}
.btn-logout{width:100%;padding:.55rem;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.82rem}
.btn-logout:hover{border-color:var(--red);color:var(--red)}
.main{margin-left:240px;flex:1}
.topbar{padding:1rem 2rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;background:rgba(10,10,15,.9);backdrop-filter:blur(12px)}
.topbar-title{font-size:1.3rem;font-weight:700}
.btn-primary{padding:.6rem 1.4rem;background:linear-gradient(135deg,var(--gold),var(--gl));color:#000;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.9rem;transition:all .2s}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(212,175,55,0.3)}
.content{padding:1.5rem 2rem}
/* GRID */
.service-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem;margin-bottom:1.5rem}
.svc-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem;transition:border-color .2s;position:relative}
.svc-card:hover{border-color:rgba(212,175,55,0.4)}
.svc-card.inactive{opacity:.55}
.svc-cat-label{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--gold);margin-bottom:.5rem}
.svc-name{font-size:1.05rem;font-weight:700;margin-bottom:.3rem}
.svc-desc{color:var(--muted);font-size:.83rem;margin-bottom.8rem;margin-bottom:.7rem;line-height:1.5}
.svc-meta{display:flex;gap.5rem;align-items:center;justify-content:space-between;margin-bottom:.8rem}
.svc-price-big{font-size:1.3rem;font-weight:800;color:var(--gold)}
.svc-dur-tag{background:rgba(255,255,255,0.05);padding:.2rem .6rem;border-radius:12px;font-size:.78rem;color:var(--muted)}
.svc-actions{display:flex;gap.5rem;gap:.4rem}
.btn-sm{padding:.35rem .8rem;border-radius:6px;font-family:'Outfit',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.btn-edit{background:var(--gdim);border:1px solid var(--gold);color:var(--gold)}
.btn-edit:hover{background:var(--gold);color:#000}
.btn-toggle{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:var(--green)}
.btn-toggle:hover{background:var(--green);color:#fff}
.btn-toggle.deact{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:var(--red)}
.btn-delete{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:var(--red)}
.btn-delete:hover{background:var(--red);color:#fff}
.inactive-badge{position:absolute;top:10px;right:10px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:var(--red);font-size:.7rem;padding:.15rem .5rem;border-radius:12px}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:1000;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.8rem;width:100%;max-width:480px;animation:mi .3s ease;max-height:90vh;overflow-y:auto}
@keyframes mi{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-title{font-size:1.2rem;font-weight:700;margin-bottom:1.2rem}
.form-group{margin-bottom:1rem}
label{display:block;font-size:.83rem;color:var(--muted);margin-bottom:.3rem;font-weight:500}
input,select,textarea{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text);padding:.7rem .9rem;border-radius:8px;font-family:'Outfit',sans-serif;font-size:.9rem;outline:none;transition:border-color .3s}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
select option{background:var(--card)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
.modal-actions{display:flex;gap.5rem;gap:.6rem;justify-content:flex-end;margin-top:1.2rem}
.btn-cancel-modal{padding:.6rem 1.2rem;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif}
.btn-save{padding:.6rem 1.4rem;background:linear-gradient(135deg,var(--gold),var(--gl));color:#000;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif}
/* CATEGORIES */
.cat-bar{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem}
.cat-pill{padding:.4rem 1rem;border-radius:24px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'Outfit',sans-serif;font-size:.85rem;transition:all .2s}
.cat-pill.active{background:var(--gdim);border-color:var(--gold);color:var(--gold)}
/* TOAST */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.8rem 1.2rem;z-index:9999;display:none;font-size:.88rem}
.toast.show{display:flex;align-items:center;gap:.5rem}
.toast.success{border-color:var(--green)}.toast.error{border-color:var(--red)}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sb-logo">✂️ Urban HairPlaza</div>
  <nav class="sb-nav">
    <a href="/owner/index.html" class="sb-link"><span>📊</span> Dashboard</a>
    <a href="/owner/bookings.html" class="sb-link"><span>📅</span> Bookings</a>
    <a href="/owner/services.html" class="sb-link active"><span>💇</span> Services</a>
    <a href="/owner/staff.html" class="sb-link"><span>👥</span> Staff</a>
    <a href="/owner/settings.html" class="sb-link"><span>⚙️</span> Salon Settings</a>
    <a href="/owner/analytics.html" class="sb-link"><span>📈</span> Analytics</a>
  </nav>
  <div class="sb-footer"><div class="sb-user">Owner<span id="sbName">—</span></div><button class="btn-logout" onclick="logout()">Sign Out</button></div>
</aside>
<div class="main">
  <div class="topbar">
    <div class="topbar-title">Services</div>
    <button class="btn-primary" onclick="openModal()">+ Add Service</button>
  </div>
  <div class="content">
    <div class="cat-bar" id="catBar"><button class="cat-pill active" onclick="filterCat('',this)">All</button></div>
    <div class="service-grid" id="serviceGrid"><div style="color:var(--muted)">Loading...</div></div>
  </div>
</div>

<!-- SERVICE MODAL -->
<div class="modal-overlay" id="svcModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Add Service</div>
    <input type="hidden" id="editId">
    <div class="form-group"><label>Service Name *</label><input id="fName" placeholder="e.g. Full Head Colour"></div>
    <div class="form-group"><label>Category</label>
      <select id="fCat">
        <option>Hair</option><option>Colour</option><option>Beard</option><option>Spa</option><option>Massage</option><option>Nails</option><option>Skin</option><option>Packages</option>
      </select></div>
    <div class="form-row">
      <div class="form-group"><label>Price (₹) *</label><input type="number" id="fPrice" placeholder="850"></div>
      <div class="form-group"><label>Duration (mins) *</label><input type="number" id="fDur" placeholder="60"></div>
    </div>
    <div class="form-group"><label>Description</label><textarea id="fDesc" rows="3" placeholder="Short description of the service"></textarea></div>
    <div id="modalErr" style="color:var(--red);font-size:.82rem;margin-bottom:.6rem;display:none"></div>
    <div class="modal-actions">
      <button class="btn-cancel-modal" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveService()">Save Service</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api';
const getToken = () => localStorage.getItem('uhp_token');
const getUser = () => { try { return JSON.parse(localStorage.getItem('uhp_user')); } catch { return null; } };
const user = getUser();
if (!user || user.role !== 'owner') window.location.href = '/customer/index.html';
document.getElementById('sbName').textContent = user?.name || '';
const headers = { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' };
let services = [], currentCat = '';
function toast(msg, type='success') { const t=document.getElementById('toast'); t.textContent=msg; t.className=`toast show ${type}`; setTimeout(()=>t.classList.remove('show'),3000); }
function logout() { localStorage.clear(); window.location.href = '/customer/index.html'; }

async function load() {
  const r = await fetch(`${API}/owner/services`, { headers });
  services = await r.json();
  buildCatBar();
  renderGrid();
}

function buildCatBar() {
  const cats = [...new Set(services.map(s => s.category))];
  const bar = document.getElementById('catBar');
  bar.innerHTML = `<button class="cat-pill active" onclick="filterCat('',this)">All (${services.length})</button>` +
    cats.map(c => `<button class="cat-pill" onclick="filterCat('${c}',this)">${c} (${services.filter(s=>s.category===c).length})</button>`).join('');
}

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function renderGrid() {
  const filtered = currentCat ? services.filter(s => s.category === currentCat) : services;
  const grid = document.getElementById('serviceGrid');
  if (!filtered.length) { grid.innerHTML = '<div style="color:var(--muted)">No services found.</div>'; return; }
  grid.innerHTML = filtered.map(s => `
    <div class="svc-card ${s.is_active ? '' : 'inactive'}">
      ${!s.is_active ? '<div class="inactive-badge">Inactive</div>' : ''}
      <div class="svc-cat-label">${s.category}</div>
      <div class="svc-name">${s.name}</div>
      <div class="svc-desc">${s.description||''}</div>
      <div class="svc-meta">
        <div class="svc-price-big">₹${s.price.toLocaleString('en-IN')}</div>
        <div class="svc-dur-tag">⏱ ${s.duration_min} min</div>
      </div>
      <div class="svc-actions">
        <button class="btn-sm btn-edit" onclick="openModal(${s.id})">✏️ Edit</button>
        <button class="btn-sm btn-toggle ${s.is_active?'deact':''}" onclick="toggleActive(${s.id},${s.is_active})">${s.is_active?'Deactivate':'Activate'}</button>
        <button class="btn-sm btn-delete" onclick="deleteService(${s.id})">🗑</button>
      </div>
    </div>`).join('');
}

function openModal(id) {
  document.getElementById('editId').value = id || '';
  document.getElementById('modalErr').style.display = 'none';
  if (id) {
    const s = services.find(sv => sv.id === id);
    document.getElementById('modalTitle').textContent = 'Edit Service';
    document.getElementById('fName').value = s.name;
    document.getElementById('fCat').value = s.category;
    document.getElementById('fPrice').value = s.price;
    document.getElementById('fDur').value = s.duration_min;
    document.getElementById('fDesc').value = s.description || '';
  } else {
    document.getElementById('modalTitle').textContent = 'Add Service';
    ['fName','fPrice','fDur','fDesc'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fCat').value = 'Hair';
  }
  document.getElementById('svcModal').classList.add('open');
}
function closeModal() { document.getElementById('svcModal').classList.remove('open'); }

async function saveService() {
  const id = document.getElementById('editId').value;
  const errEl = document.getElementById('modalErr');
  const body = {
    name: document.getElementById('fName').value.trim(),
    category: document.getElementById('fCat').value,
    price: parseFloat(document.getElementById('fPrice').value),
    duration_min: parseInt(document.getElementById('fDur').value),
    description: document.getElementById('fDesc').value.trim(),
  };
  if (!body.name || !body.price || !body.duration_min) { errEl.textContent = 'Name, price, and duration are required.'; errEl.style.display = 'block'; return; }
  const url = id ? `${API}/owner/services/${id}` : `${API}/owner/services`;
  const method = id ? 'PUT' : 'POST';
  const r = await fetch(url, { method, headers, body: JSON.stringify(body) });
  const data = await r.json();
  if (!r.ok) { errEl.textContent = data.error; errEl.style.display = 'block'; return; }
  closeModal();
  toast(id ? '✅ Service updated' : '✅ Service added');
  load();
}

async function toggleActive(id, current) {
  const r = await fetch(`${API}/owner/services/${id}`, { method:'PUT', headers, body: JSON.stringify({ is_active: current ? 0 : 1 }) });
  if (r.ok) { toast('✅ Updated'); load(); } else toast('❌ Failed','error');
}

async function deleteService(id) {
  if (!confirm('Deactivate this service?')) return;
  const r = await fetch(`${API}/owner/services/${id}`, { method:'DELETE', headers });
  if (r.ok) { toast('✅ Service deactivated'); load(); } else toast('❌ Failed','error');
}

load();
</script>
</body>
</html>
