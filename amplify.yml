version: 1

# ─────────────────────────────────────────────────────────────────────────────
# AWS Amplify Hosting build specification — Urban HairPlaza
#
# Architecture:
#   GitHub push → Amplify CI/CD → CloudFront CDN + S3 (static frontend)
#                                  ↑
#   Rewrites: /api/* → API Gateway → Lambda (Express backend)
#
# IMPORTANT: This file lives in urban_hairplaza/amplify.yml
# Set "App root" to "urban_hairplaza" in Amplify Console → App settings → Build settings
# ─────────────────────────────────────────────────────────────────────────────

frontend:
  phases:
    preBuild:
      commands:
        - echo "=== Urban HairPlaza — Amplify Frontend Build ==="
        - echo "Node $(node -v) | npm $(npm -v)"
        # Only install prod deps (no need for express/pg in a static build)
        - npm ci --cache .npm --prefer-offline --omit=dev

    build:
      commands:
        - echo "=== Copying portal files to dist/ ==="
        # Create combined output: /customer, /owner, /admin, plus root index
        - mkdir -p dist
        - cp -r frontend/customer dist/customer
        - cp -r frontend/owner    dist/owner
        - cp -r frontend/admin    dist/admin
        # Root redirect → customer portal
        - |
          cat > dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html><head>
          <meta charset="UTF-8">
          <meta http-equiv="refresh" content="0; url=/customer/">
          <title>Urban HairPlaza</title>
          </head><body>
          <p>Redirecting to <a href="/customer/">Customer Portal</a>...</p>
          </body></html>
          EOF
        - echo "=== Build complete ==="
        - ls -la dist/

    postBuild:
      commands:
        - echo "Deployed portals:"
        - echo "  Customer → /customer/"
        - echo "  Owner    → /owner/"
        - echo "  Admin    → /admin/"

  # Amplify publishes everything inside dist/
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'

  # Cache node_modules between builds
  cache:
    paths:
      - .npm/**/*

  customHeaders:
    # Security headers
    - pattern: '**/*'
      headers:
        - key: Strict-Transport-Security
          value: max-age=31536000; includeSubDomains
        - key: X-Content-Type-Options
          value: nosniff
        - key: X-Frame-Options
          value: SAMEORIGIN
        - key: Referrer-Policy
          value: strict-origin-when-cross-origin

    # Long-lived cache for static assets
    - pattern: '**/*.css'
      headers:
        - key: Cache-Control
          value: public, max-age=31536000, immutable
    - pattern: '**/*.js'
      headers:
        - key: Cache-Control
          value: public, max-age=31536000, immutable
    - pattern: '**/*.{png,jpg,jpeg,gif,webp,svg,ico,woff,woff2}'
      headers:
        - key: Cache-Control
          value: public, max-age=31536000, immutable

    # Always fresh HTML
    - pattern: '**/*.html'
      headers:
        - key: Cache-Control
          value: no-cache, no-store, must-revalidate
